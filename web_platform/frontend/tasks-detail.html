        (function() {
            const savedTheme = localStorage.getItem('app_theme');
            if (savedTheme) {
                const theme = savedTheme === 'system' 
                    ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                    : savedTheme;
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();

    <div class="container-fluid py-4 px-4">
        <div class="row mb-4">
            <div class="col">
                <h4 class="mb-0">任务详情</h4>
                <p class="text-muted">查看和管理测试任务的详细信息</p>
            </div>
            <div class="col-auto">
                <button class="btn btn-success me-2" onclick="executeTask()" id="executeBtn">
                    <i class="bi bi-play-fill me-2"></i>执行
                </button>
                <a href="/tasks.html" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-2"></i>返回
                </a>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-info-circle me-2"></i>基本信息</h5>
                    </div>
                    <div class="card-body">
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label text-muted small mb-1">任务名称</label>
                                <h4 id="taskName">-</h4>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small mb-1">状态</label>
                                <div id="taskStatus"></div>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label text-muted small mb-1">测试类型</label>
                                <div id="taskType" class="fs-5">-</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small mb-1">测试场景</label>
                                <div id="taskScene" class="fs-5">-</div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted small mb-1">测试路径</label>
                            <code id="taskPath" class="d-block p-2 bg-light dark-bg-card rounded">-</code>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted small mb-1">任务描述</label>
                            <p id="taskDescription" class="text-break mb-0">-</p>
                        </div>

                        <div class="mb-0">
                            <label class="form-label text-muted small mb-1">环境配置</label>
                            <pre id="taskEnvConfig" class="bg-light dark-bg-card p-3 rounded mb-0">-</pre>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header">
                        <h6 class="mb-0"><i class="bi bi-clock-history me-2"></i>执行历史</h6>
                    </div>
                    <div class="card-body" id="executionHistory">
                        <p class="text-muted text-center mb-0">暂无执行记录</p>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h6 class="mb-0"><i class="bi bi-info-circle me-2"></i>任务信息</h6>
                    </div>
                    <div class="card-body">
                        <p class="mb-3">
                            <small class="text-muted d-block mb-1">创建时间：</small>
                            <span id="createdAt" class="fw-medium">-</span>
                        </p>
                        <p class="mb-3">
                            <small class="text-muted d-block mb-1">更新时间：</small>
                            <span id="updatedAt" class="fw-medium">-</span>
                        </p>
                        <p class="mb-0">
                            <small class="text-muted d-block mb-1">创建者：</small>
                            <span id="createdBy" class="fw-medium">-</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/crypto.js"></script>
<script src="/static/js/user-menu.js"></script>
    <script>
        let taskId = null;

        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/index.html';
                return false;
            }
            return true;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        function getTaskIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const idFromParams = urlParams.get('id');
            if (idFromParams) return idFromParams;
            
            const pathSegments = window.location.pathname.split('/');
            return pathSegments[pathSegments.length - 1];
        }

        async function loadTaskDetail() {
            try {
                const response = await fetch(API_BASE + '/tasks/' + taskId, {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const data = await response.json();

                if (data.code === 200) {
                    const task = data.data;
                    document.getElementById('taskName').textContent = task.name;
                    document.getElementById('taskType').textContent = getTestTypeName(task.test_type);
                    document.getElementById('taskScene').textContent = getSceneName(task.scene);
                    document.getElementById('taskPath').textContent = task.test_path || '-';
                    document.getElementById('taskDescription').textContent = task.description || '无';
                    document.getElementById('taskEnvConfig').textContent = JSON.stringify(task.env_config || {}, null, 2);

                    const statusBadge = getStatusBadgeHtml(task.status);
                    document.getElementById('taskStatus').innerHTML = statusBadge;

                    document.getElementById('createdAt').textContent = formatDateTime(task.created_at);
                    document.getElementById('updatedAt').textContent = formatDateTime(task.updated_at);
                    document.getElementById('createdBy').textContent = task.created_by || '系统';

                    if (task.status === 'running') {
                        document.getElementById('executeBtn').disabled = true;
                        document.getElementById('executeBtn').innerHTML = '<i class="bi bi-hourglass-split me-2"></i>执行中';
                    }
                } else {
                    showToast(data.message || '获取任务详情失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }

        async function executeTask() {
            try {
                const btn = document.getElementById('executeBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>执行中...';

                const response = await fetch(API_BASE + '/tasks/' + taskId + '/execute', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token'),
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();

                if (data.code === 200) {
                    showToast('执行已启动', 'success');
                    setTimeout(() => {
                        window.location.href = '/execution-monitor.html?execution_id=' + data.data.execution_id;
                    }, 1000);
                } else {
                    showToast(data.message || '执行失败', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-play-fill me-2"></i>执行';
                }
            } catch (error) {
                showToast('网络错误', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-play-fill me-2"></i>执行';
            }
        }

        function getStatusBadgeHtml(status) {
            const badges = {
                idle: '<span class="badge bg-secondary">空闲</span>',
                running: '<span class="badge bg-warning">执行中</span>',
                success: '<span class="badge bg-success">成功</span>',
                failed: '<span class="badge bg-danger">失败</span>',
                stopped: '<span class="badge bg-dark">已停止</span>'
            };
            return badges[status] || '<span class="badge bg-secondary">' + status + '</span>';
        }

        function getSceneName(scene) {
            const names = {
                platform: '测试平台',
                local: '本地服务',
                external: '外部网站',
                other: '其他'
            };
            return names[scene] || scene;
        }

        function getTestTypeName(type) {
            const names = {
                api: 'API测试',
                ui: 'UI测试',
                smoke: '冒烟测试',
                android: 'Android',
                ios: 'iOS',
                windows: 'Windows',
                linux: 'Linux',
                harmony: '鸿蒙',
                service: '服务测试',
                performance: '性能测试',
                ai: 'AI测试',
                whitebox: '白盒测试'
            };
            return names[type] || type;
        }

        function formatDateTime(timeStr) {
            if (!timeStr) return '-';
            const timeValue = String(timeStr).trim();
            let date = new Date(timeValue);
            if (isNaN(date.getTime()) && timeValue.includes(' ')) {
                date = new Date(timeValue.replace(' ', 'T'));
            }
            if (isNaN(date.getTime())) return timeValue;
            const hasTimezone = /[+-]\d{2}:\d{2}$|Z$/.test(timeValue);
            if (!hasTimezone) {
                const offset = date.getTimezoneOffset() * 60000;
                date = new Date(date.getTime() + offset);
            }
            return date.toLocaleString('zh-CN');
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (checkAuth()) {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const displayName = user.nickname || user.username || '管理员';
                const currentUserEl = document.getElementById('currentUser');
                if (currentUserEl) currentUserEl.textContent = displayName;
                const userFullnameEl = document.getElementById('userFullname');
                const userEmailEl = document.getElementById('userEmail');
                if (userFullnameEl) userFullnameEl.textContent = displayName;
                if (userEmailEl) userEmailEl.textContent = user.email || '-';
                const avatarPlaceholder = document.querySelector('.user-avatar-placeholder');
                const avatarLargePlaceholder = document.querySelector('.user-avatar-large-placeholder');
                const firstLetter = (displayName.charAt(0) || 'A').toUpperCase();
                if (avatarPlaceholder) avatarPlaceholder.textContent = firstLetter;
                if (avatarLargePlaceholder) avatarLargePlaceholder.textContent = firstLetter;
                taskId = getTaskIdFromUrl();
                if (!taskId) {
                    showToast('缺少任务ID', 'error');
                    setTimeout(() => window.location.href = '/tasks.html', 1000);
                } else {
                    loadTaskDetail();
                }
            }
        });
    </script>

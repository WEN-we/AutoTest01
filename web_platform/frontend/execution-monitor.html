<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('app_theme');
            if (savedTheme) {
                const theme = savedTheme === 'system' 
                    ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                    : savedTheme;
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();
    </script>

                    <li class="nav-item dropdown">

            <div class="d-flex align-items-center">

                    <ul class="dropdown-menu dropdown-menu-end" id="recentMonitorsDropdown" style="min-width: 250px;">

                    <div class="theme-dropdown-menu">

                            <button class="user-menu-item" id="logoutBtn">

    <div class="container-fluid py-4 px-4">
        <div class="row mb-4">
            <div class="col">
                <h4 class="mb-0">执行监控</h4>
                <p class="text-muted">Execution ID: <code id="executionId">-</code></p>
            </div>
            <div class="col-auto">
                <div class="d-flex align-items-center">
                    <div class="me-3">
                        <span class="status-indicator status-running" id="statusIndicator" title="状态指示器"></span>
                        <strong id="statusText">准备中...</strong>
                    </div>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopExecution()" style="display: none;">
                        <i class="bi bi-stop-circle me-2"></i>停止执行
                    </button>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-speedometer2 me-2"></i>执行进度</h5>
            </div>
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span title="通过率 = 通过数 / (通过数 + 失败数) × 100%">整体进度</span>
                    <span id="progressPercent" title="通过率 = 通过数 / (通过数 + 失败数) × 100%">0%</span>
                </div>
                <div class="progress mb-4" style="height: 25px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" id="progressBar"
                         role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <div class="stat-card-small">
                            <div class="stat-value text-success" id="passedCount" title="成功通过的测试用例数量">0</div>
                            <small class="stat-label">通过</small>
                        </div>
                    </div>
                    <div class="col">
                        <div class="stat-card-small">
                            <div class="stat-value text-danger" id="failedCount" title="执行失败的测试用例数量">0</div>
                            <small class="stat-label">失败</small>
                        </div>
                    </div>
                    <div class="col">
                        <div class="stat-card-small">
                            <div class="stat-value text-warning" id="skippedCount" title="被跳过的测试用例数量（未执行）">0</div>
                            <small class="stat-label">跳过</small>
                        </div>
                    </div>
                    <div class="col">
                        <div class="stat-card-small">
                            <div class="stat-value text-danger" id="errorsCount" title="执行过程中发生错误的测试用例数量">0</div>
                            <small class="stat-label">错误</small>
                        </div>
                    </div>
                    <div class="col">
                        <div class="stat-card-small">
                            <div class="stat-value text-info" id="duration" title="从开始到结束的总执行时间">0s</div>
                            <small class="stat-label">耗时</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span title="显示执行过程中的实时输出和结果"><i class="bi bi-terminal me-2"></i>实时日志</span>
                <button class="btn btn-sm btn-outline-secondary" onclick="clearLogs()" title="清空日志显示区域（不影响实际日志内容）">
                    <i class="bi bi-trash me-1"></i>清空
                </button>
            </div>
            <div class="card-body p-0">
                <div class="log-container" id="logContainer">
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-hourglass-split fs-1 d-block mb-3"></i>
                        等待执行开始...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/crypto.js"></script>
<script src="/static/js/user-menu.js"></script>
    <script>
        let executionId = null;
        let pollInterval = null;
        let lastLogIndex = 0;

        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/index.html';
                return false;
            }
            return true;
        }

        function getExecutionIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            // 支持多种参数名: execution_id, id, task_id
            const idFromParams = urlParams.get('execution_id') || urlParams.get('id') || urlParams.get('task_id');
            if (idFromParams) return idFromParams;

            const pathSegments = window.location.pathname.split('/');
            return pathSegments[pathSegments.length - 1];
        }

        function init() {
            if (!checkAuth()) return;

            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const displayName = user.nickname || user.username || '管理员';
            const currentUserEl = document.getElementById('currentUser');
            if (currentUserEl) currentUserEl.textContent = displayName;
            const userFullnameEl = document.getElementById('userFullname');
            const userEmailEl = document.getElementById('userEmail');
            if (userFullnameEl) userFullnameEl.textContent = displayName;
            if (userEmailEl) userEmailEl.textContent = user.email || '-';
            const avatarPlaceholder = document.querySelector('.user-avatar-placeholder');
            const avatarLargePlaceholder = document.querySelector('.user-avatar-large-placeholder');
            const firstLetter = (displayName.charAt(0) || 'A').toUpperCase();
            if (avatarPlaceholder) avatarPlaceholder.textContent = firstLetter;
            if (avatarLargePlaceholder) avatarLargePlaceholder.textContent = firstLetter;

            executionId = getExecutionIdFromUrl();
            if (!executionId || executionId === '' || executionId === 'execution-monitor.html') {
                showToast('缺少执行ID参数', 'error');
                console.error('无法获取执行ID, URL:', window.location.href);
                return;
            }

            document.getElementById('executionId').textContent = executionId;
            console.log('初始化执行监控, ID:', executionId);
            loadExecutionStatus();
            loadNewLogs();
            startPolling();
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(() => {
                loadExecutionStatus();
                loadNewLogs();
            }, 2000);
            console.log('轮询已启动');
        }

        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
                console.log('轮询已停止');
            }
        }

        async function loadExecutionStatus() {
            try {
                const res = await fetch(API_BASE + '/execution/' + executionId + '/status', {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    }
                });

                const data = await res.json();
                console.log('获取执行状态:', data);
                if (data.code === 200) {
                    updateStatus(data.data);
                }
            } catch (error) {
                console.error('获取状态失败:', error);
            }
        }

        function updateStatus(status) {
            const statusText = document.getElementById('statusText');
            const statusIndicator = document.getElementById('statusIndicator');
            const stopBtn = document.getElementById('stopBtn');

            const statusTooltips = {
                pending: '等待中...',
                running: '任务正在执行中，请耐心等待...',
                success: '任务执行完成，所有测试用例通过',
                failed: '任务执行完成，存在失败的测试用例',
                stopped: '任务被人为停止，未完成执行'
            };

            statusIndicator.setAttribute('title', statusTooltips[status.status] || '状态指示器');

            statusText.textContent = getStatusText(status.status);
            statusIndicator.className = 'status-indicator status-' + status.status;

            if (status.status === 'running') {
                stopBtn.style.display = 'inline-block';
            } else {
                stopBtn.style.display = 'none';
                stopPolling();
            }

            if (status.result_summary) {
                const summary = status.result_summary;
                document.getElementById('passedCount').textContent = summary.passed || 0;
                document.getElementById('failedCount').textContent = summary.failed || 0;
                document.getElementById('skippedCount').textContent = summary.skipped || 0;
                document.getElementById('errorsCount').textContent = summary.errors || 0;

                if (summary.duration !== null && summary.duration !== undefined) {
                    document.getElementById('duration').textContent = summary.duration + 's';
                }

                const total = (summary.passed || 0) + (summary.failed || 0) + (summary.skipped || 0) + (summary.errors || 0);
                if (total > 0) {
                    const percent = Math.round(((summary.passed || 0) / total) * 100);
                    document.getElementById('progressPercent').textContent = percent + '%';
                    document.getElementById('progressBar').style.width = percent + '%';

                    if (status.status === 'success') {
                        document.getElementById('progressBar').className = 'progress-bar bg-success';
                        document.getElementById('progressBar').style.width = '100%';
                        document.getElementById('progressPercent').textContent = '100% (完成)';
                    } else if (status.status === 'failed') {
                        document.getElementById('progressBar').className = 'progress-bar bg-danger';
                    }
                }
            }
        }

        async function loadNewLogs() {
            try {
                const res = await fetch(API_BASE + '/execution/' + executionId + '/logs?offset=' + lastLogIndex + '&limit=50', {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    }
                });

                const data = await res.json();
                if (data.code === 200 && data.data.logs.length > 0) {
                    console.log('获取到新日志:', data.data.logs.length, '条');
                    appendLogs(data.data.logs);
                    lastLogIndex += data.data.logs.length;
                }
            } catch (error) {
                console.error('获取日志失败:', error);
            }
        }

        function appendLogs(logs) {
            const container = document.getElementById('logContainer');

            if (container.querySelector('.text-muted')) {
                container.innerHTML = '';
            }

            logs.forEach(log => {
                const line = document.createElement('div');
                line.className = 'log-line';

                const timestamp = new Date(log.timestamp).toLocaleTimeString('zh-CN');
                const message = log.message;

                let messageClass = 'log-info';
                if (message.includes('PASSED') || message.includes('✅') || message.includes('passed')) {
                    messageClass = 'log-success';
                } else if (message.includes('FAILED') || message.includes('❌') || message.includes('ERROR') || message.includes('错误')) {
                    messageClass = 'log-error';
                }

                line.innerHTML = '<span class="log-timestamp">[' + timestamp + ']</span> ' + formatLogMessage(message, messageClass);
                container.appendChild(line);
            });

            container.scrollTop = container.scrollHeight;
        }

        function formatLogMessage(message, messageClass) {
            message = escapeHtml(message);
            message = message.replace(/PASSED/g, '<span class="log-success">PASSED</span>');
            message = message.replace(/FAILED/g, '<span class="log-error">FAILED</span>');
            message = message.replace(/ERROR/g, '<span class="log-error">ERROR</span>');
            message = message.replace(/✅/g, '<span class="log-success">✅</span>');
            message = message.replace(/❌/g, '<span class="log-error">❌</span>');
            return message;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function clearLogs() {
            const container = document.getElementById('logContainer');
            container.innerHTML = '<div class="text-center text-muted py-5">' +
                '<i class="bi bi-check-circle fs-1 d-block mb-3 text-success"></i>' +
                '日志已清空' +
                '</div>';
        }

        async function stopExecution() {
            if (!confirm('确定要停止当前执行吗？')) return;

            try {
                const res = await fetch(API_BASE + '/execution/' + executionId + '/stop', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    }
                });

                const data = await res.json();
                if (data.code === 200) {
                    showToast('执行已停止', 'warning');
                    stopPolling();
                    loadExecutionStatus();
                } else {
                    showToast(data.message || '停止失败', 'error');
                }
            } catch (error) {
                showToast('停止失败: ' + error.message, 'error');
            }
        }

        function getStatusText(status) {
            const texts = {
                pending: '等待中',
                running: '执行中',
                success: '执行成功',
                failed: '执行失败',
                stopped: '已停止'
            };
            return texts[status] || status;
        }

        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>

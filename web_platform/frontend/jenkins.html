<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('app_theme');
            if (savedTheme) {
                const theme = savedTheme === 'system' 
                    ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                    : savedTheme;
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();
    </script>

                    </li>

                    <li class="nav-item dropdown">

            <div class="d-flex align-items-center">

                    </ul>

                <!-- 现代化主题切换下拉组件 -->

                    <button class="theme-toggle-btn">
                        <span class="theme-icon"></span>
                        <span class="theme-label"></span>
                        <i class="bi bi-chevron-down ms-2" style="font-size: 12px;"></i>
                    </button>
                    <div class="theme-dropdown-menu">
                        <div class="theme-dropdown-header">主题模式</div>

                            <div class="theme-option-content">
                                <div class="theme-option-title">夜间模式</div>
                                <div class="theme-option-desc">护眼舒适的深色主题</div>

                            <div class="theme-option-check">

                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </div>
                        </div>
                        
                        <div class="theme-option" data-theme="system">
                            <div class="theme-option-icon">💻</div>
                            <div class="theme-option-content">
                                <div class="theme-option-title">跟随系统</div>
                                <div class="theme-option-desc">自动跟随系统设置切换</div>
                            </div>
                            <div class="theme-option-check">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14">
                                    <polyline points="20 6 9 17 4 12"></polyline>

                            </div>

                    </div>
                </div>
                
                <!-- 用户管理下拉菜单 (GitHub风格) -->

                        <img class="user-avatar" src="" alt="头像" style="display: none;">

                            <div class="user-info">

                                <div class="user-details">

                        </div>

    <div class="container-fluid py-4 px-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="mb-0">Jenkins集成</h4>
                <p class="text-muted mb-0">管理Jenkins任务和构建</p>
            </div>
            <div>
                <button class="btn btn-secondary me-2" onclick="checkStatus()" title="检测Jenkins连接状态和可用任务数量">
                    <i class="bi bi-arrow-repeat me-1"></i>检查连接
                </button>
                <button class="btn btn-primary" onclick="refreshJobs()" title="重新获取Jenkins任务列表">
                    <i class="bi bi-arrow-clockwise me-1"></i>刷新任务
                </button>
            </div>
        </div>

        <div class="alert" id="statusAlert" style="display: none;">
            <span id="statusText"></span>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Jenkins任务列表</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>任务名称</th>
                                <th>状态</th>
                                <th>最新构建</th>
                                <th>最近成功</th>
                                <th>最近失败</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="jobsTableBody">
                            <tr><td colspan="6" class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm me-2"></div>加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="buildModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">触发构建</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="buildForm">
                        <div class="mb-3">
                            <label class="form-label">任务名称</label>
                            <input type="text" class="form-control" name="job_name" id="jobName" readonly title="要触发的Jenkins任务名称">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">构建参数 (JSON)</label>
                            <textarea class="form-control" name="parameters" rows="4" placeholder='{"KEY": "VALUE"}' title="以JSON格式传入构建参数，如无需参数可留空"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" title="取消并关闭对话框">取消</button>
                    <button type="button" class="btn btn-primary" onclick="triggerBuild()" title="向Jenkins服务器发起构建请求">触发构建</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/crypto.js"></script>
<script src="/static/js/user-menu.js"></script>
    <script>
        let buildModal = null;

        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/index.html';
                return false;
            }
            return true;
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (checkAuth()) {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const displayName = user.nickname || user.username || '管理员';
                document.getElementById('currentUser').textContent = displayName;
                const userFullnameEl = document.getElementById('userFullname');
                const userEmailEl = document.getElementById('userEmail');
                if (userFullnameEl) userFullnameEl.textContent = displayName;
                if (userEmailEl) userEmailEl.textContent = user.email || '-';
                const avatarPlaceholder = document.querySelector('.user-avatar-placeholder');
                const avatarLargePlaceholder = document.querySelector('.user-avatar-large-placeholder');
                const firstLetter = (displayName.charAt(0) || 'A').toUpperCase();
                if (avatarPlaceholder) avatarPlaceholder.textContent = firstLetter;
                if (avatarLargePlaceholder) avatarLargePlaceholder.textContent = firstLetter;
                buildModal = new bootstrap.Modal(document.getElementById('buildModal'));
                checkStatus();
                loadJobs();
            }
        });

        async function checkStatus() {
            const alert = document.getElementById('statusAlert');
            alert.style.display = 'block';
            alert.className = 'alert alert-info';
            document.getElementById('statusText').textContent = '检查连接中...';

            try {
                const response = await API.jenkins.status();
                if (response.code === 200 && response.data.connected) {
                    alert.className = 'alert alert-success';
                    document.getElementById('statusText').textContent = `✓ Jenkins已连接 - ${response.data.message} (${response.data.jobs_count}个任务)`;
                } else {
                    alert.className = 'alert alert-warning';
                    document.getElementById('statusText').textContent = `⚠ ${response.data.message}`;
                }
            } catch (error) {
                alert.className = 'alert alert-danger';
                document.getElementById('statusText').textContent = '✗ Jenkins未配置或连接失败';
            }
        }

        async function loadJobs() {
            try {
                const response = await API.jenkins.jobs();
                if (response.code === 200) {
                    renderJobs(response.data.jobs || []);
                }
            } catch (error) {
                document.getElementById('jobsTableBody').innerHTML = '<tr><td colspan="6" class="text-center text-danger py-4">加载失败</td></tr>';
            }
        }

        function renderJobs(jobs) {
            const tbody = document.getElementById('jobsTableBody');
            if (!jobs.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">暂无任务</td></tr>';
                return;
            }
            tbody.innerHTML = jobs.map(job => `
                <tr>
                    <td><a href="${job.url}" target="_blank">${job.name}</a></td>
                    <td><span class="badge ${getJobColor(job.color)}">${getJobStatus(job.color)}</span></td>
                    <td>${job.last_build ? '#' + job.last_build.number : '-'}</td>
                    <td>${job.last_success ? '#' + job.last_success.number : '-'}</td>
                    <td>${job.last_failure ? '#' + job.last_failure.number : '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="showBuildModal('${job.name}')" title="打开构建参数配置对话框">触发构建</button>
                    </td>
                </tr>
            `).join('');
            if (typeof initTooltips === 'function') {
                initTooltips();
            }
        }

        function getJobStatus(color) {
            if (!color) return '未知';
            if (color.includes('blue') || color.includes('green')) return '成功';
            if (color.includes('red') || color.includes('failure')) return '失败';
            if (color.includes('yellow') || color.includes('unstable')) return '不稳定';
            if (color.includes('anime') || color.includes('running')) return '运行中';
            return '未构建';
        }

        function getJobColor(color) {
            if (!color) return 'bg-secondary';
            if (color.includes('blue') || color.includes('green')) return 'bg-success';
            if (color.includes('red') || color.includes('failure')) return 'bg-danger';
            if (color.includes('yellow') || color.includes('unstable')) return 'bg-warning';
            if (color.includes('anime') || color.includes('running')) return 'bg-info';
            return 'bg-secondary';
        }

        function showBuildModal(jobName) {
            document.getElementById('jobName').value = jobName;
            document.getElementById('buildForm').reset();
            document.getElementById('jobName').value = jobName;
            buildModal.show();
        }

        async function triggerBuild() {
            const jobName = document.getElementById('jobName').value;
            const paramsStr = document.querySelector('[name="parameters"]').value;
            let parameters = {};
            if (paramsStr.trim()) {
                try { parameters = JSON.parse(paramsStr); } catch { showToast('参数JSON格式错误', 'error'); return; }
            }

            try {
                const response = await API.jenkins.build({ job_name: jobName, parameters });
                if (response.code === 200) {
                    showToast('构建已触发', 'success');
                    buildModal.hide();
                }
            } catch (error) { showToast(error.message, 'error'); }
        }

        function refreshJobs() { loadJobs(); checkStatus(); }
    </script>
</body>
</html>

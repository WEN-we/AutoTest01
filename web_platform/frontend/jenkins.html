<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins - 测试平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-shield-check" style="font-size: 28px;"></i>
            <span style="font-size: 18px; font-weight: 600;">测试平台</span>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="bi bi-house"></i><span>首页</span></a>
            <a href="tasks.html" class="nav-item" data-page="tasks"><i class="bi bi-list-task"></i><span>测试任务</span></a>
            <a href="ai-models.html" class="nav-item" data-page="ai-models"><i class="bi bi-cpu"></i><span>AI模型</span></a>
            <a href="reports.html" class="nav-item" data-page="reports"><i class="bi bi-file-earmark-text"></i><span>测试报告</span></a>
            <div class="nav-item" style="padding-left: 20px; color: rgba(255,255,255,0.4); font-size: 12px;">第三方集成</div>
            <a href="integrations.html" class="nav-item" data-page="integrations"><i class="bi bi-plug"></i><span>集成配置</span></a>
            <a href="jenkins.html" class="nav-item active" data-page="jenkins"><i class="bi bi-hdd"></i><span>Jenkins</span></a>
            <a href="zentao.html" class="nav-item" data-page="zentao"><i class="bi bi-kanban"></i><span>禅道</span></a>
        </div>
        <div style="position: absolute; bottom: 20px; left: 0; right: 0; padding: 0 20px;">
            <div class="nav-item" onclick="logout()"><i class="bi bi-box-arrow-right"></i><span>退出登录</span></div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <h2 class="page-title">Jenkins集成</h2>
            <div>
                <button class="btn btn-secondary me-2" onclick="checkStatus()" data-tooltip="检测Jenkins连接状态和可用任务数量">
                    <i class="bi bi-arrow-repeat me-1"></i>检查连接
                </button>
                <button class="btn btn-primary" onclick="refreshJobs()" data-tooltip="重新获取Jenkins任务列表">
                    <i class="bi bi-arrow-clockwise me-1"></i>刷新任务
                </button>
            </div>
        </div>

        <!-- 连接状态 -->
        <div class="alert" id="statusAlert" style="display: none;">
            <span id="statusText"></span>
        </div>

        <!-- 任务列表 -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Jenkins任务列表</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>任务名称</th>
                                <th>状态</th>
                                <th>最新构建</th>
                                <th>最近成功</th>
                                <th>最近失败</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="jobsTableBody">
                            <tr><td colspan="6" class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm me-2"></div>加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 触发构建弹窗 -->
    <div class="modal fade" id="buildModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">触发构建</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="buildForm">
                        <div class="mb-3">
                            <label class="form-label">任务名称</label>
                            <input type="text" class="form-control" name="job_name" id="jobName" readonly data-tooltip="要触发的Jenkins任务名称">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">构建参数 (JSON)</label>
                            <textarea class="form-control" name="parameters" rows="4" placeholder='{"KEY": "VALUE"}' data-tooltip="以JSON格式传入构建参数，如无需参数可留空"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-tooltip="取消并关闭对话框">取消</button>
                    <button type="button" class="btn btn-primary" onclick="triggerBuild()" data-tooltip="向Jenkins服务器发起构建请求">触发构建</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/app.js"></script>
    <script>
        let buildModal = null;

        document.addEventListener('DOMContentLoaded', function() {
            if (!isLoggedIn()) { window.location.href = 'index.html'; return; }
            buildModal = new bootstrap.Modal(document.getElementById('buildModal'));
            checkStatus();
            loadJobs();
        });

        async function checkStatus() {
            const alert = document.getElementById('statusAlert');
            alert.style.display = 'block';
            alert.className = 'alert alert-info';
            document.getElementById('statusText').textContent = '检查连接中...';

            try {
                const response = await API.jenkins.status();
                if (response.code === 200 && response.data.connected) {
                    alert.className = 'alert alert-success';
                    document.getElementById('statusText').textContent = `✓ Jenkins已连接 - ${response.data.message} (${response.data.jobs_count}个任务)`;
                } else {
                    alert.className = 'alert alert-warning';
                    document.getElementById('statusText').textContent = `⚠ ${response.data.message}`;
                }
            } catch (error) {
                alert.className = 'alert alert-danger';
                document.getElementById('statusText').textContent = '✗ Jenkins未配置或连接失败';
            }
        }

        async function loadJobs() {
            try {
                const response = await API.jenkins.jobs();
                if (response.code === 200) {
                    renderJobs(response.data.jobs || []);
                }
            } catch (error) {
                document.getElementById('jobsTableBody').innerHTML = '<tr><td colspan="6" class="text-center text-danger py-4">加载失败</td></tr>';
            }
        }

        function renderJobs(jobs) {
            const tbody = document.getElementById('jobsTableBody');
            if (!jobs.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">暂无任务</td></tr>';
                return;
            }
            tbody.innerHTML = jobs.map(job => `
                <tr>
                    <td><a href="${job.url}" target="_blank">${job.name}</a></td>
                    <td><span class="badge ${getJobColor(job.color)}">${getJobStatus(job.color)}</span></td>
                    <td>${job.last_build ? '#' + job.last_build.number : '-'}</td>
                    <td>${job.last_success ? '#' + job.last_success.number : '-'}</td>
                    <td>${job.last_failure ? '#' + job.last_failure.number : '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="showBuildModal('${job.name}')" data-tooltip="打开构建参数配置对话框">触发构建</button>
                    </td>
                </tr>
            `).join('');
        }

        function getJobStatus(color) {
            if (!color) return '未知';
            if (color.includes('blue') || color.includes('green')) return '成功';
            if (color.includes('red') || color.includes('failure')) return '失败';
            if (color.includes('yellow') || color.includes('unstable')) return '不稳定';
            if (color.includes('anime') || color.includes('running')) return '运行中';
            return '未构建';
        }

        function getJobColor(color) {
            if (!color) return 'bg-secondary';
            if (color.includes('blue') || color.includes('green')) return 'bg-success';
            if (color.includes('red') || color.includes('failure')) return 'bg-danger';
            if (color.includes('yellow') || color.includes('unstable')) return 'bg-warning';
            if (color.includes('anime') || color.includes('running')) return 'bg-info';
            return 'bg-secondary';
        }

        function showBuildModal(jobName) {
            document.getElementById('jobName').value = jobName;
            document.getElementById('buildForm').reset();
            document.getElementById('jobName').value = jobName;
            buildModal.show();
        }

        async function triggerBuild() {
            const jobName = document.getElementById('jobName').value;
            const paramsStr = document.querySelector('[name="parameters"]').value;
            let parameters = {};
            if (paramsStr.trim()) {
                try { parameters = JSON.parse(paramsStr); } catch { showToast('参数JSON格式错误', 'error'); return; }
            }

            try {
                const response = await API.jenkins.build({ job_name: jobName, parameters });
                if (response.code === 200) {
                    showToast('构建已触发', 'success');
                    buildModal.hide();
                }
            } catch (error) { showToast(error.message, 'error'); }
        }

        function refreshJobs() { loadJobs(); checkStatus(); }
        function logout() { if (confirm('退出?')) { localStorage.clear(); window.location.href = 'index.html'; } }
    </script>
    <script src="static/js/tooltips.js"></script>
</body>
</html>

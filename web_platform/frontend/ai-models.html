<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI模型配置 - 测试平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-shield-check" style="font-size: 28px;"></i>
            <span style="font-size: 18px; font-weight: 600;">测试平台</span>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="bi bi-house"></i><span>首页</span></a>
            <a href="tasks.html" class="nav-item" data-page="tasks"><i class="bi bi-list-task"></i><span>测试任务</span></a>
            <a href="ai-models.html" class="nav-item active" data-page="ai-models"><i class="bi bi-cpu"></i><span>AI模型</span></a>
            <a href="reports.html" class="nav-item" data-page="reports"><i class="bi bi-file-earmark-text"></i><span>测试报告</span></a>
            <div class="nav-item" style="padding-left: 20px; color: rgba(255,255,255,0.4); font-size: 12px;">第三方集成</div>
            <a href="integrations.html" class="nav-item" data-page="integrations"><i class="bi bi-plug"></i><span>集成配置</span></a>
            <a href="jenkins.html" class="nav-item" data-page="jenkins"><i class="bi bi-hdd"></i><span>Jenkins</span></a>
            <a href="zentao.html" class="nav-item" data-page="zentao"><i class="bi bi-kanban"></i><span>禅道</span></a>
        </div>
        <div style="position: absolute; bottom: 20px; left: 0; right: 0; padding: 0 20px;">
            <div class="nav-item" onclick="logout()"><i class="bi bi-box-arrow-right"></i><span>退出登录</span></div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <h2 class="page-title">AI模型配置</h2>
            <button class="btn btn-primary" onclick="showCreateModal()">
                <i class="bi bi-plus-circle me-1"></i>添加模型
            </button>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>模型名称</th>
                                <th>类型</th>
                                <th>API地址</th>
                                <th>模型ID</th>
                                <th>优先级</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="modelsTableBody">
                            <tr><td colspan="7" class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm me-2"></div>加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 创建模型弹窗 -->
    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加AI模型</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createForm">
                        <div class="mb-3">
                            <label class="form-label">模型类型 *</label>
                            <select class="form-select" name="model_type" required>
                                <option value="">请选择</option>
                                <option value="qwen">通义千问</option>
                                <option value="deepseek">DeepSeek</option>
                                <option value="zhipu">智谱AI</option>
                                <option value="doubao">豆包</option>
                                <option value="openai">OpenAI</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">模型名称 *</label>
                            <input type="text" class="form-control" name="model_name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">API Key *</label>
                            <input type="password" class="form-control" name="api_key" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">API地址</label>
                            <input type="text" class="form-control" name="base_url" placeholder="留空使用默认地址">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">模型ID</label>
                            <input type="text" class="form-control" name="model_id">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">优先级</label>
                            <input type="number" class="form-control" name="priority" value="0">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="createModel()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/app.js"></script>
    <script>
        let createModal = null;

        document.addEventListener('DOMContentLoaded', function() {
            if (!isLoggedIn()) { window.location.href = 'index.html'; return; }
            createModal = new bootstrap.Modal(document.getElementById('createModal'));
            loadModels();
        });

        async function loadModels() {
            try {
                const response = await API.aiModels.list();
                if (response.code === 200) {
                    renderModels(response.data.models || []);
                }
            } catch (error) {
                showToast('加载失败', 'error');
            }
        }

        function renderModels(models) {
            const tbody = document.getElementById('modelsTableBody');
            if (!models.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = models.map(m => `
                <tr>
                    <td>${m.id}</td>
                    <td>${m.model_name}</td>
                    <td>${m.model_type}</td>
                    <td>${m.base_url || '-'}</td>
                    <td>${m.model_id || '-'}</td>
                    <td>${m.priority}</td>
                    <td>
                        <button class="btn btn-sm btn-primary me-1" onclick="testModel(${m.id})">测试</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteModel(${m.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        function showCreateModal() { document.getElementById('createForm').reset(); createModal.show(); }

        async function createModel() {
            const form = document.getElementById('createForm');
            const formData = new FormData(form);
            const data = {};
            formData.forEach((v, k) => data[k] = v);
            data.priority = parseInt(data.priority) || 0;

            try {
                const response = await API.aiModels.create(data);
                if (response.code === 200) {
                    showToast('创建成功', 'success');
                    createModal.hide();
                    loadModels();
                }
            } catch (error) { showToast(error.message, 'error'); }
        }

        async function testModel(id) {
            try {
                const response = await API.aiModels.test(id);
                if (response.code === 200) showToast('连接成功', 'success');
            } catch (error) { showToast('连接失败', 'error'); }
        }

        async function deleteModel(id) {
            if (!confirm('确定删除?')) return;
            try {
                const response = await API.aiModels.delete(id);
                if (response.code === 200) { showToast('已删除', 'success'); loadModels(); }
            } catch (error) { showToast(error.message, 'error'); }
        }

        function logout() { if (confirm('退出?')) { localStorage.clear(); window.location.href = 'index.html'; } }
    </script>
</body>
</html>

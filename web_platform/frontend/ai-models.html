        (function() {
            const savedTheme = localStorage.getItem('app_theme');
            if (savedTheme) {
                const theme = savedTheme === 'system' 
                    ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                    : savedTheme;
                document.documentElement.setAttribute('data-theme', theme);

    <div class="container-fluid py-4 px-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="mb-0">AI模型配置</h4>
                <p class="text-muted mb-0">管理AI模型配置和连接</p>
            </div>
            <button class="btn btn-primary" onclick="showCreateModal()">
                <i class="bi bi-plus-circle me-1"></i>添加模型
            </button>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>模型名称</th>
                                <th>类型</th>
                                <th>API地址</th>
                                <th>模型ID</th>
                                <th>优先级</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="modelsTableBody">
                            <tr><td colspan="7" class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm me-2"></div>加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加AI模型</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createForm">
                        <div class="mb-3">
                            <label class="form-label">模型类型 *</label>
                            <select class="form-select" name="model_type" required>
                                <option value="">请选择</option>
                                <option value="qwen">通义千问</option>
                                <option value="deepseek">DeepSeek</option>
                                <option value="zhipu">智谱AI</option>
                                <option value="doubao">豆包</option>
                                <option value="openai">OpenAI</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">模型名称 *</label>
                            <input type="text" class="form-control" name="model_name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">API Key *</label>
                            <input type="password" class="form-control" name="api_key" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">API地址</label>
                            <input type="text" class="form-control" name="base_url" placeholder="留空使用默认地址">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">模型ID</label>
                            <input type="text" class="form-control" name="model_id">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">优先级</label>
                            <input type="number" class="form-control" name="priority" value="0">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="createModel()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑AI模型</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <input type="hidden" name="id" id="editModelId">
                        <div class="mb-3">
                            <label class="form-label">模型类型 *</label>
                            <select class="form-select" name="model_type" id="editModelType" required>
                                <option value="">请选择</option>
                                <option value="qwen">通义千问</option>
                                <option value="deepseek">DeepSeek</option>
                                <option value="zhipu">智谱AI</option>
                                <option value="doubao">豆包</option>
                                <option value="openai">OpenAI</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">模型名称 *</label>
                            <input type="text" class="form-control" name="model_name" id="editModelName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">API Key</label>
                            <input type="password" class="form-control" name="api_key" id="editApiKey" placeholder="留空则不修改">
                            <small class="text-muted">留空表示不修改当前API Key</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">API地址</label>
                            <input type="text" class="form-control" name="base_url" id="editBaseUrl" placeholder="留空使用默认地址">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">模型ID</label>
                            <input type="text" class="form-control" name="model_id" id="editModelIdField">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">优先级</label>
                            <input type="number" class="form-control" name="priority" id="editPriority" value="0">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="updateModel()">保存更改</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/crypto.js"></script>
<script src="/static/js/user-menu.js"></script>
    <script>
        let createModal = null;
        let editModal = null;
        let currentEditData = null;

        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/index.html';
                return false;
            }
            return true;
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (checkAuth()) {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const displayName = user.nickname || user.username || '管理员';
                document.getElementById('currentUser').textContent = displayName;
                const userFullnameEl = document.getElementById('userFullname');
                const userEmailEl = document.getElementById('userEmail');
                if (userFullnameEl) userFullnameEl.textContent = displayName;
                if (userEmailEl) userEmailEl.textContent = user.email || '-';
                const avatarPlaceholder = document.querySelector('.user-avatar-placeholder');
                const avatarLargePlaceholder = document.querySelector('.user-avatar-large-placeholder');
                const firstLetter = (displayName.charAt(0) || 'A').toUpperCase();
                if (avatarPlaceholder) avatarPlaceholder.textContent = firstLetter;
                if (avatarLargePlaceholder) avatarLargePlaceholder.textContent = firstLetter;
                createModal = new bootstrap.Modal(document.getElementById('createModal'));
                editModal = new bootstrap.Modal(document.getElementById('editModal'));
                loadModels();
            }
        });

        async function loadModels() {
            try {
                const response = await API.aiModels.list();
                if (response.code === 200) {
                    renderModels(response.data.models || []);
                }
            } catch (error) {
                showToast('加载失败', 'error');
            }
        }

        function renderModels(models) {
            const tbody = document.getElementById('modelsTableBody');
            if (!models.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = models.map(m => `
                <tr>
                    <td>${m.id}</td>
                    <td>${m.name || m.model_name || '-'}</td>
                    <td>${m.model_type}</td>
                    <td>${m.base_url || '-'}</td>
                    <td>${m.model_id || '-'}</td>
                    <td>${m.priority}</td>
                    <td>
                        <button class="btn btn-sm btn-success me-1" onclick="editModel(${m.id}, event)" title="编辑该模型配置">编辑</button>
                        <button class="btn btn-sm btn-primary me-1" onclick="testModel(${m.id}, event)" title="测试模型连接">测试</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteModel(${m.id}, event)" title="删除该模型配置">删除</button>
                    </td>
                </tr>
            `).join('');
            if (typeof initTooltips === 'function') {
                initTooltips();
            }
        }

        function showCreateModal() { document.getElementById('createForm').reset(); createModal.show(); }

        async function createModel() {
            const form = document.getElementById('createForm');
            const formData = new FormData(form);
            const data = {};
            formData.forEach((v, k) => data[k] = v);
            data.priority = parseInt(data.priority) || 0;

            try {
                const response = await API.aiModels.create(data);
                if (response.code === 200) {
                    showToast('创建成功', 'success');
                    createModal.hide();
                    loadModels();
                }
            } catch (error) { showToast(error.message, 'error'); }
        }

        async function testModel(id, event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            try {
                const response = await API.aiModels.test(id);
                if (response.code === 200) {
                    showToast(response.message, 'success');
                } else {
                    showToast(response.message || '连接失败', 'error');
                }
            } catch (error) {
                showToast(error.message || '连接失败', 'error');
            }
        }

        async function deleteModel(id, event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            if (!confirm('确定删除该模型配置吗？')) return;
            try {
                const response = await API.aiModels.delete(id);
                if (response.code === 200) { showToast('已删除', 'success'); loadModels(); }
            } catch (error) { showToast(error.message, 'error'); }
        }

        function editModel(id, event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            const tbody = document.getElementById('modelsTableBody');
            const rows = tbody.querySelectorAll('tr');
            let modelData = null;
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 7 && cells[0].textContent == id) {
                    modelData = {
                        id: id,
                        model_type: cells[2].textContent,
                        name: cells[1].textContent,
                        base_url: cells[3].textContent === '-' ? '' : cells[3].textContent,
                        model_id: cells[4].textContent === '-' ? '' : cells[4].textContent,
                        priority: cells[5].textContent
                    };
                }
            });
            if (!modelData) {
                showToast('未找到模型数据', 'error');
                return;
            }
            currentEditData = modelData;
            document.getElementById('editModelId').value = modelData.id;
            document.getElementById('editModelType').value = modelData.model_type;
            document.getElementById('editModelName').value = modelData.name;
            document.getElementById('editBaseUrl').value = modelData.base_url;
            document.getElementById('editModelIdField').value = modelData.model_id;
            document.getElementById('editPriority').value = modelData.priority;
            document.getElementById('editApiKey').value = '';
            editModal.show();
        }

        async function updateModel() {
            const id = document.getElementById('editModelId').value;
            const data = {
                model_type: document.getElementById('editModelType').value,
                model_name: document.getElementById('editModelName').value,
                base_url: document.getElementById('editBaseUrl').value,
                model_id: document.getElementById('editModelIdField').value,
                priority: parseInt(document.getElementById('editPriority').value) || 0
            };
            const apiKey = document.getElementById('editApiKey').value;
            if (apiKey) {
                data.api_key = apiKey;
            }
            if (!data.model_type || !data.model_name) {
                showToast('模型类型和名称不能为空', 'error');
                return;
            }
            try {
                const response = await API.aiModels.update(id, data);
                if (response.code === 200) {
                    showToast('更新成功', 'success');
                    editModal.hide();
                    loadModels();
                } else {
                    showToast(response.message || '更新失败', 'error');
                }
            } catch (error) {
                showToast(error.message || '更新失败', 'error');
            }
        }
    </script>
</body>
</html>

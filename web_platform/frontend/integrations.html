<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集成配置 - 测试平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><i class="bi bi-shield-check" style="font-size: 28px;"></i><span style="font-size: 18px; font-weight: 600;">测试平台</span></div>
        <div class="sidebar-nav">
            <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="bi bi-house"></i><span>首页</span></a>
            <a href="tasks.html" class="nav-item" data-page="tasks"><i class="bi bi-list-task"></i><span>测试任务</span></a>
            <a href="ai-models.html" class="nav-item" data-page="ai-models"><i class="bi bi-cpu"></i><span>AI模型</span></a>
            <a href="reports.html" class="nav-item" data-page="reports"><i class="bi bi-file-earmark-text"></i><span>测试报告</span></a>
            <div class="nav-item" style="padding-left: 20px; color: rgba(255,255,255,0.4); font-size: 12px;">第三方集成</div>
            <a href="integrations.html" class="nav-item active" data-page="integrations"><i class="bi bi-plug"></i><span>集成配置</span></a>
            <a href="jenkins.html" class="nav-item" data-page="jenkins"><i class="bi bi-hdd"></i><span>Jenkins</span></a>
            <a href="zentao.html" class="nav-item" data-page="zentao"><i class="bi bi-kanban"></i><span>禅道</span></a>
        </div>
        <div style="position: absolute; bottom: 20px; left: 0; right: 0; padding: 0 20px;">
            <div class="nav-item" onclick="logout()"><i class="bi bi-box-arrow-right"></i><span>退出登录</span></div>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <h2 class="page-title">集成配置</h2>
            <button class="btn btn-primary" onclick="showCreateModal()" data-tooltip="添加新的第三方集成配置"><i class="bi bi-plus-circle me-1"></i>添加配置</button>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead><tr><th>ID</th><th>名称</th><th>类型</th><th>URL</th><th>状态</th><th>操作</th></tr></thead>
                    <tbody id="integrationsBody"><tr><td colspan="6" class="text-center">加载中...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">添加集成配置</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="createForm">
                        <div class="mb-3">
                            <label class="form-label">集成类型 *</label>
                            <select class="form-select" name="integration_type" required data-tooltip="选择要集成的第三方系统类型">
                                <option value="">请选择</option>
                                <option value="jenkins">Jenkins</option>
                                <option value="zentao">禅道</option>
                            </select>
                        </div>
                        <div class="mb-3"><label class="form-label">名称 *</label><input type="text" class="form-control" name="name" required data-tooltip="为此集成配置指定一个易识别的名称"></div>
                        <div class="mb-3"><label class="form-label">服务地址 *</label><input type="text" class="form-control" name="base_url" placeholder="http://example.com" required data-tooltip="第三方系统的访问地址，包含协议和域名"></div>
                        <div class="jenkins-fields" style="display:none;">
                            <div class="mb-3"><label class="form-label">用户名</label><input type="text" class="form-control" name="username" data-tooltip="Jenkins账户用户名，用于API认证"></div>
                            <div class="mb-3"><label class="form-label">API Token</label><input type="password" class="form-control" name="api_token" data-tooltip="Jenkins用户的API Token，可在用户设置中生成"></div>
                        </div>
                        <div class="zentao-fields" style="display:none;">
                            <div class="mb-3"><label class="form-label">账户</label><input type="text" class="form-control" name="account" data-tooltip="禅道系统的登录账户"></div>
                            <div class="mb-3"><label class="form-label">密码</label><input type="password" class="form-control" name="password" data-tooltip="禅道账户的登录密码"></div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-tooltip="取消并关闭对话框">取消</button>
                    <button type="button" class="btn btn-primary" onclick="createIntegration()" data-tooltip="保存配置到系统">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/app.js"></script>
    <script>
        let createModal = null;
        document.addEventListener('DOMContentLoaded', function() {
            if (!isLoggedIn()) { window.location.href = 'index.html'; return; }
            createModal = new bootstrap.Modal(document.getElementById('createModal'));
            document.querySelector('[name="integration_type"]').addEventListener('change', toggleFields);
            loadIntegrations();
        });

        function toggleFields() {
            const type = document.querySelector('[name="integration_type"]').value;
            document.querySelector('.jenkins-fields').style.display = type === 'jenkins' ? 'block' : 'none';
            document.querySelector('.zentao-fields').style.display = type === 'zentao' ? 'block' : 'none';
        }

        async function loadIntegrations() {
            try {
                const response = await API.integrations.list();
                if (response.code === 200) renderIntegrations(response.data.integrations || []);
            } catch { showToast('加载失败', 'error'); }
        }

        function renderIntegrations(integrations) {
            const tbody = document.getElementById('integrationsBody');
            if (!integrations.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center">暂无配置</td></tr>'; return; }
            tbody.innerHTML = integrations.map(i => `
                <tr>
                    <td>${i.id}</td>
                    <td>${i.name}</td>
                    <td>${i.integration_type}</td>
                    <td>${i.base_url}</td>
                    <td><span class="badge bg-${i.is_active ? 'success' : 'secondary'}">${i.is_active ? '启用' : '禁用'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-primary me-1" onclick="testIntegration('${i.integration_type}')" data-tooltip="测试该集成配置的连接是否正常">测试</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteIntegration(${i.id})" data-tooltip="删除该集成配置，删除后不可恢复">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        function showCreateModal() { document.getElementById('createForm').reset(); toggleFields(); createModal.show(); }

        async function createIntegration() {
            const form = document.getElementById('createForm');
            const formData = new FormData(form);
            const type = formData.get('integration_type');
            const data = {
                integration_type: type,
                name: formData.get('name'),
                base_url: formData.get('base_url'),
                credentials: type === 'jenkins'
                    ? { username: formData.get('username'), api_token: formData.get('api_token') }
                    : { account: formData.get('account'), password: formData.get('password') }
            };

            try {
                const response = await API.integrations.create(data);
                if (response.code === 200) { showToast('创建成功', 'success'); createModal.hide(); loadIntegrations(); }
            } catch (error) { showToast(error.message, 'error'); }
        }

        async function testIntegration(type) {
            try {
                const response = await API.integrations.test(type);
                if (response.code === 200) showToast(response.message, 'success');
            } catch (error) { showToast('测试失败', 'error'); }
        }

        async function deleteIntegration(id) { if (!confirm('删除?')) return; try { const r = await API.integrations.delete(id); if (r.code === 200) { showToast('已删除', 'success'); loadIntegrations(); } } catch (e) { showToast(e.message, 'error'); } }
        function logout() { if (confirm('退出?')) { localStorage.clear(); window.location.href = 'index.html'; } }
    </script>
    <script src="static/js/tooltips.js"></script>
</body>
</html>

        <div class="card">
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="searchInput" placeholder="搜索任务名称..." onkeyup="filterTasks()" title="输入任务名称进行搜索">

                    <div class="col-md-2">
                        <select class="form-select" id="filterScene" onchange="filterTasks()" title="按测试场景筛选：平台、本地、外部、其他">

                            <option value="platform">测试平台本身</option>
                            <option value="local">测试本地服务</option>
                            <option value="external">测试外部网站</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" id="filterType" onchange="filterTasks()" title="按测试类型筛选：API、UI、冒烟等">
                            <option value="">全部类型</option>
                            <option value="api">API测试</option>
                            <option value="ui">UI测试</option>
                            <option value="smoke">冒烟测试</option>
                            <option value="performance">性能测试</option>
                            <option value="android">Android</option>
                            <option value="ios">iOS</option>
                            <option value="windows">Windows</option>
                            <option value="linux">Linux</option>
                            <option value="harmony">鸿蒙</option>
                            <option value="service">服务测试</option>
                            <option value="ai">AI测试</option>
                            <option value="whitebox">白盒测试</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" id="filterStatus" onchange="filterTasks()" title="按任务状态筛选：空闲、执行中、成功、失败">
                            <option value="">全部状态</option>
                            <option value="idle">空闲</option>
                            <option value="running">执行中</option>
                            <option value="success">成功</option>
                            <option value="failed">失败</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-secondary w-100" onclick="resetFilters()" title="清空所有筛选条件">
                            <i class="bi bi-arrow-counterclockwise me-1"></i>重置
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table">
                        <thead>
                                <tr>
                                    <th width="40">
                                        <input type="checkbox" id="selectAll" onchange="toggleSelectAll()" title="选择所有任务进行批量操作">
                                    </th>
                                    <th>任务名称</th>
                                    <th>场景</th>
                                    <th>类型</th>
                                    <th>状态</th>
                                    <th>执行次数</th>
                                    <th>最近执行</th>

    <div class="modal fade" id="deleteModal" tabindex="-1">

                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                    <p>确定要删除任务 "<span id="deleteTaskName"></span>" 吗？</p>
                    <p class="text-danger small">此操作不可恢复！</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" onclick="confirmDelete()">
                        <i class="bi bi-trash me-1"></i>确认删除

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="/static/js/user-menu.js"></script>
    <script>
        let allTasks = [];
        let deleteTaskId = null;

        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/index.html';
                return false;
            }
            return true;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        async function loadTasks() {
            try {
                const res = await fetch(API_BASE + '/tasks?page=1&page_size=100', {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    }
                });

                const data = await res.json();
                if (data.code === 200) {
                    allTasks = data.data.items || [];
                    document.getElementById('totalCount').textContent = allTasks.length;
                    filterTasks();
                }
            } catch (error) {
                showToast('加载任务失败: ' + error.message, 'error');
            }
        }

        function filterTasks() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const scene = document.getElementById('filterScene').value;
            const type = document.getElementById('filterType').value;
            const status = document.getElementById('filterStatus').value;

            let filtered = allTasks;

            if (search) {
                filtered = filtered.filter(t => t.name.toLowerCase().includes(search));
            }

            if (scene) {
                filtered = filtered.filter(t => t.scene === scene);
            }

            if (type) {
                filtered = filtered.filter(t => t.test_type === type);
            }

            if (status) {
                filtered = filtered.filter(t => t.status === status);
            }

            renderTasks(filtered);
        }

        function getSelectedTaskIds() {
            const checkboxes = document.querySelectorAll('.task-checkbox:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function restoreTaskCheckboxes(selectedIds) {
            if (!selectedIds || selectedIds.length === 0) return;
            const checkboxes = document.querySelectorAll('.task-checkbox');
            checkboxes.forEach(cb => {
                if (selectedIds.includes(cb.value)) {
                    cb.checked = true;
                }
            });
            updateBatchDeleteButton();
        }

        function renderTasks(tasks) {
            const tbody = document.getElementById('taskTable');
            const selectedIds = getSelectedTaskIds();

            if (tasks.length === 0) {
                tbody.innerHTML = '<tr>' +
                    '<td colspan="8" class="text-center text-muted py-5">' +
                    '<i class="bi bi-inbox fs-1 d-block mb-2"></i>' +
                    '暂无匹配的任务' +
                    '</td>' +
                    '</tr>';
                return;
            }

            tbody.innerHTML = tasks.map(task => '<tr class="selectable-row" data-task-id="' + task.id + '">' +
                '<td>' +
                '<input type="checkbox" class="task-checkbox" value="' + task.id + '" onchange="updateBatchDeleteButton()">' +
                '</td>' +
                '<td>' +
                '<div class="fw-bold">' + task.name + '</div>' +
                '<small class="text-muted">' + (task.description || '无描述') + '</small>' +
                '</td>' +
                '<td><span class="badge badge-' + getSceneBadge(task.scene) + '">' + getSceneName(task.scene) + '</span></td>' +
                '<td><span class="badge badge-' + getTypeBadge(task.test_type) + '">' + getTestTypeName(task.test_type) + '</span></td>' +
                '<td><span class="badge badge-' + getStatusBadge(task.status) + '">' + getStatusText(task.status) + '</span></td>' +
                '<td>' + (task.run_count || 0) + '</td>' +
                '<td>' + formatTime(task.last_run_at) + '</td>' +
                '<td>' +
                '<div class="btn-group btn-group-sm">' +
                '<button class="btn btn-primary" onclick="event.stopPropagation(); executeTask(' + task.id + ')" title="立即执行此任务，跳转到监控页面查看实时日志">' +
                '<i class="bi bi-play"></i>' +
                '</button>' +
                '<button class="btn btn-outline-secondary" onclick="event.stopPropagation(); viewTask(' + task.id + ')" title="查看任务详情和配置信息">' +
                '<i class="bi bi-eye"></i>' +
                '</button>' +
                '<button class="btn btn-outline-danger" onclick="event.stopPropagation(); showDeleteModal(' + task.id + ', \'' + task.name.replace(/'/g, "\\'") + '\')" title="删除任务及其所有执行记录（不可恢复）">' +
                '<i class="bi bi-trash"></i>' +
                '</button>' +
                '</div>' +
                '</td>' +
                '</tr>').join('');

            restoreTaskCheckboxes(selectedIds);

            tbody.querySelectorAll('.selectable-row').forEach(row => {
                row.addEventListener('click', function(e) {
                    if (e.target.closest('input[type="checkbox"]') || e.target.closest('.btn-group')) {
                        return;
                    }
                    const checkbox = this.querySelector('.task-checkbox');
                    if (checkbox) {
                        checkbox.checked = !checkbox.checked;
                        updateBatchDeleteButton();
                    }
                });
            });

            if (typeof initTooltips === 'function') {
                initTooltips();
            }
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterScene').value = '';
            document.getElementById('filterType').value = '';
            document.getElementById('filterStatus').value = '';
            filterTasks();
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.task-checkbox');
            checkboxes.forEach(cb => cb.checked = selectAll.checked);
            updateBatchDeleteButton();
        }

        function syncSelectAllCheckbox() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.task-checkbox');
            
            if (!selectAll) return;
            
            const allChecked = checkboxes.length > 0 && Array.from(checkboxes).every(cb => cb.checked);
            const noneChecked = checkboxes.length === 0 || Array.from(checkboxes).every(cb => !cb.checked);
            
            if (allChecked) {
                selectAll.checked = true;
                selectAll.indeterminate = false;
            } else if (noneChecked) {
                selectAll.checked = false;
                selectAll.indeterminate = false;
            } else {
                selectAll.indeterminate = true;
            }
        }

        function updateBatchDeleteButton() {
            const selected = document.querySelectorAll('.task-checkbox:checked');
            const batchBtn = document.getElementById('batchDeleteBtn');
            const selectedCount = document.getElementById('selectedCount');

            if (!batchBtn || !selectedCount) return;

            if (selected.length > 0) {
                batchBtn.style.display = 'inline-block';
                selectedCount.textContent = selected.length;
            } else {
                batchBtn.style.display = 'none';
                selectedCount.textContent = '0';
            }
            syncSelectAllCheckbox();
        }

        async function batchDeleteTasks() {
            const selected = document.querySelectorAll('.task-checkbox:checked');
            if (selected.length === 0) {
                showToast('请先选择要删除的任务', 'warning');
                return;
            }

            if (!confirm(`确定要删除选中的 ${selected.length} 个任务吗？此操作不可恢复。`)) {
                updateBatchDeleteButton();
                return;
            }

            const taskIds = Array.from(selected).map(cb => cb.value);

            try {
                const res = await fetch(API_BASE + '/tasks/batch-delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    body: JSON.stringify({ task_ids: taskIds })
                });

                const data = await res.json();
                if (data.code === 200) {
                    showToast(data.message || '删除成功', 'success');
                    loadTasks();
                } else {
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        async function executeTask(taskId) {
            try {
                const res = await fetch(API_BASE + '/tasks/' + taskId + '/execute', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    }
                });

                const data = await res.json();
                if (data.code === 200) {
                    showToast('任务已启动', 'success');
                    setTimeout(() => {
                        location.href = '/execution-monitor.html?execution_id=' + data.data.execution_id;
                    }, 1000);
                } else {
                    showToast(data.message || '启动失败', 'error');
                }
            } catch (error) {
                showToast('启动失败: ' + error.message, 'error');
            }
        }

        function viewTask(taskId) {
            location.href = '/tasks-detail.html?id=' + taskId;
        }

        function showDeleteModal(taskId, taskName) {
            deleteTaskId = taskId;
            document.getElementById('deleteTaskName').textContent = taskName;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }

        async function confirmDelete() {
            if (!deleteTaskId) return;

            try {
                const res = await fetch(API_BASE + '/tasks/' + deleteTaskId, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    }
                });

                const data = await res.json();
                if (data.code === 200) {
                    showToast('任务已删除', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                    loadTasks();
                } else {
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        function getSceneBadge(scene) {
            const badges = {
                platform: 'platform',
                local: 'local',
                external: 'external',
                other: 'other'
            };
            return badges[scene] || 'other';
        }

        function getSceneName(scene) {
            const names = {
                platform: '测试平台',
                local: '本地服务',
                external: '外部网站',
                other: '其他'
            };
            return names[scene] || scene;
        }

        function getTypeBadge(type) {
            const badges = {
                api: 'api',
                ui: 'ui',
                smoke: 'warning',
                android: 'success',
                ios: 'info',
                windows: 'primary',
                linux: 'primary',
                harmony: 'info',
                service: 'warning',
                performance: 'danger',
                ai: 'danger',
                whitebox: 'secondary'
            };
            return badges[type] || 'secondary';
        }

        function getStatusBadge(status) {
            const badges = {
                idle: 'secondary',
                running: 'warning',
                success: 'success',
                failed: 'danger',
                stopped: 'secondary'
            };
            return badges[status] || 'secondary';
        }

        function getStatusText(status) {
            const texts = {
                idle: '空闲',
                running: '执行中',
                success: '成功',
                failed: '失败',
                stopped: '已停止'
            };
            return texts[status] || status;
        }

        function getTestTypeName(type) {
            const names = {
                api: 'API测试',
                ui: 'UI测试',
                smoke: '冒烟测试',
                android: 'Android',
                ios: 'iOS',
                windows: 'Windows',
                linux: 'Linux',
                harmony: '鸿蒙',
                service: '服务测试',
                performance: '性能测试',
                ai: 'AI测试',
                whitebox: '白盒测试'
            };
            return names[type] || type;
        }

        function formatTime(timeStr) {
            if (!timeStr) return '-';

            // 处理各种时间格式
            let date;
            const timeValue = String(timeStr).trim();

            // 尝试直接解析
            date = new Date(timeValue);

            // 如果解析失败，尝试替换空格为T（MySQL格式: 2026-05-21 16:12:28）
            if (isNaN(date.getTime()) && timeValue.includes(' ')) {
                date = new Date(timeValue.replace(' ', 'T'));
            }

            // 如果仍然解析失败，返回原始值
            if (isNaN(date.getTime())) {
                return timeValue;
            }

            // 检查时间字符串是否包含时区信息
            const hasTimezone = /[+-]\d{2}:\d{2}$|Z$/.test(timeValue);

            // 如果没有时区信息，说明是本地时间，需要补偿时区偏移
            // 因为 JavaScript 会将无时区的字符串视为 UTC，然后转换为本地时间
            if (!hasTimezone) {
                const offset = date.getTimezoneOffset() * 60000; // 转换为毫秒
                date = new Date(date.getTime() + offset);
            }

            return date.toLocaleString('zh-CN');
        }

        if (checkAuth()) {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const displayName = user.nickname || user.username || '管理员';
            const currentUserEl = document.getElementById('currentUser');
            if (currentUserEl) currentUserEl.textContent = displayName;
            const userFullnameEl = document.getElementById('userFullname');
            const userEmailEl = document.getElementById('userEmail');
            if (userFullnameEl) userFullnameEl.textContent = displayName;
            if (userEmailEl) userEmailEl.textContent = user.email || '-';
            const avatarPlaceholder = document.querySelector('.user-avatar-placeholder');
            const avatarLargePlaceholder = document.querySelector('.user-avatar-large-placeholder');
            const firstLetter = (displayName.charAt(0) || 'A').toUpperCase();
            if (avatarPlaceholder) avatarPlaceholder.textContent = firstLetter;
            if (avatarLargePlaceholder) avatarLargePlaceholder.textContent = firstLetter;
            loadTasks();
        }

        // 自动刷新任务列表（每5秒），确保状态实时更新
        setInterval(() => {
            if (!document.hidden) {
                loadTasks();
            }
        }, 5000);
    </script>

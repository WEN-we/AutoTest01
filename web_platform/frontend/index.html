<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 测试平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="bi bi-shield-check"></i>
                </div>
                <h1 class="login-title">测试平台</h1>
                <p class="login-subtitle">自动化测试管理平台</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                    <div class="invalid-feedback" id="usernameError"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                    <div class="invalid-feedback" id="passwordError"></div>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">记住我</label>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2" id="loginBtn">
                    <span class="spinner-border spinner-border-sm d-none" id="loading"></span>
                    <span id="btnText">登 录</span>
                </button>
            </form>

            <div class="text-center mt-3">
                <span class="text-muted">还没有账号？</span>
                <a href="#" onclick="alert('请联系管理员创建账号')" class="text-primary">立即注册</a>
            </div>
        </div>
    </div>

    <script src="static/js/app.js"></script>
    <script>
        if (isLoggedIn()) {
            window.location.href = '/dashboard';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showToast('请输入用户名和密码', 'error');
                return;
            }

            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');
            const btnText = document.getElementById('btnText');

            loginBtn.disabled = true;
            loading.classList.remove('d-none');
            btnText.textContent = '登录中...';

            try {
                const response = await API.auth.login(username, password);

                if (response.code === 200) {
                    localStorage.setItem('token', response.data.token);
                    localStorage.setItem('user', JSON.stringify(response.data.user));
                    showToast('登录成功', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    showToast(response.message || '登录失败', 'error');
                }
            } catch (error) {
                showToast(error.message || '网络错误，请稍后重试', 'error');
            } finally {
                loginBtn.disabled = false;
                loading.classList.add('d-none');
                btnText.textContent = '登 录';
            }
        });
    </script>
</body>
</html>

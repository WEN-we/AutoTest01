<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禅道 - 测试平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-shield-check" style="font-size: 28px;"></i>
            <span style="font-size: 18px; font-weight: 600;">测试平台</span>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="bi bi-house"></i><span>首页</span></a>
            <a href="tasks.html" class="nav-item" data-page="tasks"><i class="bi bi-list-task"></i><span>测试任务</span></a>
            <a href="ai-models.html" class="nav-item" data-page="ai-models"><i class="bi bi-cpu"></i><span>AI模型</span></a>
            <a href="reports.html" class="nav-item" data-page="reports"><i class="bi bi-file-earmark-text"></i><span>测试报告</span></a>
            <div class="nav-item" style="padding-left: 20px; color: rgba(255,255,255,0.4); font-size: 12px;">第三方集成</div>
            <a href="integrations.html" class="nav-item" data-page="integrations"><i class="bi bi-plug"></i><span>集成配置</span></a>
            <a href="jenkins.html" class="nav-item" data-page="jenkins"><i class="bi bi-hdd"></i><span>Jenkins</span></a>
            <a href="zentao.html" class="nav-item active" data-page="zentao"><i class="bi bi-kanban"></i><span>禅道</span></a>
        </div>
        <div style="position: absolute; bottom: 20px; left: 0; right: 0; padding: 0 20px;">
            <div class="nav-item" onclick="logout()"><i class="bi bi-box-arrow-right"></i><span>退出登录</span></div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <h2 class="page-title">禅道集成</h2>
            <div>
                <button class="btn btn-secondary me-2" onclick="checkStatus()" data-tooltip="检测禅道系统连接状态">
                    <i class="bi bi-arrow-repeat me-1"></i>检查连接
                </button>
                <button class="btn btn-success" onclick="syncCases()" data-tooltip="从禅道同步测试用例到本地">
                    <i class="bi bi-arrow-repeat me-1"></i>同步用例
                </button>
            </div>
        </div>

        <!-- 连接状态 -->
        <div class="alert" id="statusAlert" style="display: none;"></div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#products" data-tooltip="查看禅道中的产品列表">产品列表</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#cases" data-tooltip="查看和管理测试用例">测试用例</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#bugs" data-tooltip="查看禅道中提交的Bug">Bug列表</button></li>
        </ul>

        <div class="tab-content">
            <!-- 产品列表 -->
            <div class="tab-pane fade show active" id="products">
                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead><tr><th>ID</th><th>产品名称</th><th>操作</th></tr></thead>
                            <tbody id="productsBody"><tr><td colspan="3" class="text-center">加载中...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 测试用例 -->
            <div class="tab-pane fade" id="cases">
                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead><tr><th>ID</th><th>用例标题</th><th>状态</th><th>操作</th></tr></thead>
                            <tbody id="casesBody"><tr><td colspan="4" class="text-center">加载中...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Bug列表 -->
            <div class="tab-pane fade" id="bugs">
                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead><tr><th>ID</th><th>Bug标题</th><th>严重程度</th><th>状态</th></tr></thead>
                            <tbody id="bugsBody"><tr><td colspan="4" class="text-center">加载中...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (!isLoggedIn()) { window.location.href = 'index.html'; return; }
            checkStatus();
            loadProducts();
        });

        async function checkStatus() {
            const alert = document.getElementById('statusAlert');
            alert.style.display = 'block';
            alert.className = 'alert alert-info';
            alert.textContent = '检查连接中...';
            try {
                const response = await API.zentao.status();
                if (response.code === 200 && response.data.connected) {
                    alert.className = 'alert alert-success';
                    alert.textContent = '✓ 禅道已连接';
                } else {
                    alert.className = 'alert alert-warning';
                    alert.textContent = '⚠ ' + response.data.message;
                }
            } catch { alert.className = 'alert alert-danger'; alert.textContent = '✗ 禅道未配置或连接失败'; }
        }

        async function loadProducts() {
            try {
                const response = await API.zentao.products();
                if (response.code === 200) renderProducts(response.data.products || []);
            } catch { document.getElementById('productsBody').innerHTML = '<tr><td colspan="3" class="text-danger text-center">加载失败</td></tr>'; }
        }

        function renderProducts(products) {
            const tbody = document.getElementById('productsBody');
            if (!products.length) { tbody.innerHTML = '<tr><td colspan="3" class="text-center">暂无数据</td></tr>'; return; }
            tbody.innerHTML = products.map(p => `<tr><td>${p.id}</td><td>${p.name}</td><td><button class="btn btn-sm btn-primary" onclick="loadCases(${p.id})" data-tooltip="查看该产品下的所有测试用例">查看用例</button></td></tr>`).join('');
        }

        async function loadCases(productId) {
            try {
                const response = await API.zentao.cases({ product_id: productId });
                if (response.code === 200) {
                    renderCases(response.data.cases || []);
                    document.querySelector('[data-bs-target="#cases"]').click();
                }
            } catch { showToast('加载用例失败', 'error'); }
        }

        function renderCases(cases) {
            const tbody = document.getElementById('casesBody');
            if (!cases.length) { tbody.innerHTML = '<tr><td colspan="4" class="text-center">暂无数据</td></tr>'; return; }
            tbody.innerHTML = cases.map(c => `<tr><td>${c.id}</td><td>${c.title}</td><td>${c.status || '-'}</td><td><button class="btn btn-sm btn-success" onclick="executeCase(${c.id})" data-tooltip="在选定的测试环境中执行此用例">执行</button></td></tr>`).join('');
        }

        async function executeCase(caseId) { showToast('执行用例功能开发中', 'info'); }

        async function syncCases() {
            try {
                const response = await API.zentao.syncCases({ product_id: 1 });
                if (response.code === 200) showToast(response.message, 'success');
            } catch (error) { showToast(error.message, 'error'); }
        }

        function logout() { if (confirm('退出?')) { localStorage.clear(); window.location.href = 'index.html'; } }
    </script>
    <script src="static/js/tooltips.js"></script>
</body>
</html>

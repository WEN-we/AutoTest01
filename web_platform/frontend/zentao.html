<!DOCTYPE html>

<head>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('app_theme');
            if (savedTheme) {
                const theme = savedTheme === 'system' 
                    ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                    : savedTheme;
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();
    </script>

                    </ul>

                <!-- 现代化主题切换下拉组件 -->
                <div class="theme-dropdown-wrapper me-3">

                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </div>
                        </div>
                        
                        <div class="theme-option" data-theme="system">
                            <div class="theme-option-icon">💻</div>
                            <div class="theme-option-content">
                                <div class="theme-option-title">跟随系统</div>
                                <div class="theme-option-desc">自动跟随系统设置切换</div>
                            </div>
                            <div class="theme-option-check">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14">

                <!-- 用户管理下拉菜单 (GitHub风格) -->

                        <img class="user-avatar" src="" alt="头像" style="display: none;">
                        <div class="user-avatar-placeholder">A</div>

                    </button>
                    <div class="user-menu-dropdown">
                        <div class="user-menu-header">
                            <div class="user-info">
                                <img class="user-avatar-large" src="" alt="头像" style="display: none;">

                                    <div class="user-fullname" id="userFullname">管理员</div>

                            <button class="edit-profile-btn" id="editProfileBtn">编辑个人资料</button>
                        </div>
                        
                        <button class="user-menu-item" id="uploadAvatarBtn">

    <div class="container-fluid py-4 px-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="mb-0">禅道集成</h4>
                <p class="text-muted mb-0">管理禅道产品、用例和Bug</p>
            </div>
            <div>
                <button class="btn btn-secondary me-2" onclick="checkStatus()" title="检测禅道系统连接状态">
                    <i class="bi bi-arrow-repeat me-1"></i>检查连接
                </button>
                <button class="btn btn-success" onclick="syncAllData()" title="从禅道数据库实时刷新产品列表、Bug列表和测试用例数据">
            <i class="bi bi-arrow-repeat me-1"></i>同步数据
        </button>
            </div>
        </div>

        <div class="alert" id="statusAlert" style="display: none;"></div>

        <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#products" title="查看禅道中的产品列表">产品列表</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#cases" title="查看和管理测试用例">测试用例</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#bugs" title="查看禅道中提交的Bug">Bug列表</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="products">
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead><tr><th>ID</th><th>产品名称</th><th>操作</th></tr></thead>
                                <tbody id="productsBody"><tr><td colspan="3" class="text-center">加载中...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="cases">
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead><tr><th>ID</th><th>用例标题</th><th>状态</th><th>操作</th></tr></thead>
                                <tbody id="casesBody"><tr><td colspan="4" class="text-center">加载中...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="bugs">
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead><tr><th>ID</th><th>Bug标题</th><th>严重程度</th><th>状态</th></tr></thead>
                                <tbody id="bugsBody"><tr><td colspan="4" class="text-center">加载中...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/crypto.js"></script>
<script src="/static/js/user-menu.js"></script>
    <script>
        function updateRecentMonitorsDropdown() {
            const monitors = JSON.parse(localStorage.getItem('recentMonitors') || '[]');
            const dropdown = document.getElementById('recentMonitorsDropdown');
            if (!monitors.length) {
                dropdown.innerHTML = '<li><span class="dropdown-item-text text-muted small">暂无最近监控记录</span></li>';
                return;
            }
            dropdown.innerHTML = monitors.slice(0, 5).map(m =>
                `<li><a class="dropdown-item small" href="#"><i class="bi bi-circle-fill me-2 text-success" style="font-size:6px"></i>${m.name || '未命名'}</a></li>`
            ).join('');
        }

        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/index.html';
                return false;
            }
            return true;
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (checkAuth()) {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const displayName = user.nickname || user.username || '管理员';
                document.getElementById('currentUser').textContent = displayName;
                const userFullnameEl = document.getElementById('userFullname');
                const userEmailEl = document.getElementById('userEmail');
                if (userFullnameEl) userFullnameEl.textContent = displayName;
                if (userEmailEl) userEmailEl.textContent = user.email || '-';
                const avatarPlaceholder = document.querySelector('.user-avatar-placeholder');
                const avatarLargePlaceholder = document.querySelector('.user-avatar-large-placeholder');
                const firstLetter = (displayName.charAt(0) || 'A').toUpperCase();
                if (avatarPlaceholder) avatarPlaceholder.textContent = firstLetter;
                if (avatarLargePlaceholder) avatarLargePlaceholder.textContent = firstLetter;
                checkStatus();
                loadProducts();
                loadBugs();
            }

            document.querySelectorAll('button[data-bs-toggle="tab"]').forEach(function(tab) {
                tab.addEventListener('shown.bs.tab', function(e) {
                    const target = e.target.getAttribute('data-bs-target');
                    if (target === '#cases' && document.getElementById('casesBody').querySelector('td[colspan]')?.textContent === '加载中...') {
                        loadAllCases();
                    }
                    if (target === '#bugs' && document.getElementById('bugsBody').querySelector('td[colspan]')?.textContent === '加载中...') {
                        loadBugs();
                    }
                });
            });
        });

        async function checkStatus() {
            const alert = document.getElementById('statusAlert');
            alert.style.display = 'block';
            alert.className = 'alert alert-info';
            alert.textContent = '检查连接中...';
            try {
                const response = await API.zentao.status();
                if (response.code === 200 && response.data.connected) {
                    alert.className = 'alert alert-success';
                    alert.textContent = '✓ 禅道已连接';
                } else {
                    alert.className = 'alert alert-warning';
                    alert.textContent = '⚠ ' + response.data.message;
                }
            } catch { alert.className = 'alert alert-danger'; alert.textContent = '✗ 禅道未配置或连接失败'; }
        }

        async function loadProducts() {
            try {
                const response = await API.zentao.products();
                if (response.code === 200) renderProducts(response.data.products || []);
            } catch { document.getElementById('productsBody').innerHTML = '<tr><td colspan="3" class="text-danger text-center">加载失败</td></tr>'; }
        }

        function renderProducts(products) {
            const tbody = document.getElementById('productsBody');
            if (!products.length) { tbody.innerHTML = '<tr><td colspan="3" class="text-center">暂无数据</td></tr>'; return; }
            tbody.innerHTML = products.map(p => `<tr><td>${p.id}</td><td>${p.name}</td><td><button class="btn btn-sm btn-primary" onclick="loadCases(${p.id})" title="查看该产品下的所有测试用例">查看用例</button></td></tr>`).join('');
            if (typeof initTooltips === 'function') {
                initTooltips();
            }
        }

        async function loadAllCases() {
            try {
                const response = await API.zentao.cases({});
                if (response.code === 200) renderCases(response.data.cases || []);
            } catch { document.getElementById('casesBody').innerHTML = '<tr><td colspan="4" class="text-danger text-center">加载失败</td></tr>'; }
        }

        async function loadCases(productId) {
            try {
                const response = await API.zentao.cases({ product_id: productId });
                if (response.code === 200) {
                    renderCases(response.data.cases || []);
                    document.querySelector('[data-bs-target="#cases"]').click();
                }
            } catch { showToast('加载用例失败', 'error'); }
        }

        function renderCases(cases) {
            const tbody = document.getElementById('casesBody');
            if (!cases.length) { tbody.innerHTML = '<tr><td colspan="4" class="text-center">暂无数据</td></tr>'; return; }
            tbody.innerHTML = cases.map(c => `<tr><td>${c.id || '-'}</td><td>${c.title || c.name || '-'}</td><td>${c.status || '-'}</td><td><button class="btn btn-sm btn-success" onclick="executeCase(${c.id || 0})" title="在选定的测试环境中执行此用例">执行</button></td></tr>`).join('');
            if (typeof initTooltips === 'function') {
                initTooltips();
            }
        }

        async function loadBugs() {
            try {
                const response = await API.zentao.bugs({});
                if (response.code === 200) renderBugs(response.data.bugs || []);
            } catch { document.getElementById('bugsBody').innerHTML = '<tr><td colspan="4" class="text-danger text-center">加载失败</td></tr>'; }
        }

        function renderBugs(bugs) {
            const tbody = document.getElementById('bugsBody');
            if (!bugs.length) { tbody.innerHTML = '<tr><td colspan="4" class="text-center">暂无数据</td></tr>'; return; }
            tbody.innerHTML = bugs.map(b => `<tr><td>${b.id || '-'}</td><td>${b.title || b.name || '-'}</td><td>${b.severity || '-'}</td><td>${b.status || '-'}</td></tr>`).join('');
            if (typeof initTooltips === 'function') {
                initTooltips();
            }
        }

        async function executeCase(caseId) { showToast('执行用例功能开发中', 'info'); }

        async function syncAllData() {
            try {
                // 刷新三个列表
                await loadProducts();
                await loadBugs();
                await loadCases();
                showToast('数据同步完成', 'success');
            } catch (error) { showToast(error.message, 'error'); }
        }
    </script>
</body>
</html>

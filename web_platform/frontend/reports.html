<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试报告 - 测试平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><i class="bi bi-shield-check" style="font-size: 28px;"></i><span style="font-size: 18px; font-weight: 600;">测试平台</span></div>
        <div class="sidebar-nav">
            <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="bi bi-house"></i><span>首页</span></a>
            <a href="tasks.html" class="nav-item" data-page="tasks"><i class="bi bi-list-task"></i><span>测试任务</span></a>
            <a href="ai-models.html" class="nav-item" data-page="ai-models"><i class="bi bi-cpu"></i><span>AI模型</span></a>
            <a href="reports.html" class="nav-item active" data-page="reports"><i class="bi bi-file-earmark-text"></i><span>测试报告</span></a>
            <div class="nav-item" style="padding-left: 20px; color: rgba(255,255,255,0.4); font-size: 12px;">第三方集成</div>
            <a href="integrations.html" class="nav-item" data-page="integrations"><i class="bi bi-plug"></i><span>集成配置</span></a>
            <a href="jenkins.html" class="nav-item" data-page="jenkins"><i class="bi bi-hdd"></i><span>Jenkins</span></a>
            <a href="zentao.html" class="nav-item" data-page="zentao"><i class="bi bi-kanban"></i><span>禅道</span></a>
        </div>
        <div style="position: absolute; bottom: 20px; left: 0; right: 0; padding: 0 20px;">
            <div class="nav-item" onclick="logout()"><i class="bi bi-box-arrow-right"></i><span>退出登录</span></div>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header"><h2 class="page-title">测试报告</h2></div>
        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead><tr><th>ID</th><th>任务名称</th><th>报告类型</th><th>创建时间</th><th>操作</th></tr></thead>
                    <tbody id="reportsBody"><tr><td colspan="5" class="text-center">加载中...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() { if (!isLoggedIn()) { window.location.href = 'index.html'; return; } loadReports(); });

        async function loadReports() {
            try {
                const response = await API.reports.list();
                if (response.code === 200) renderReports(response.data.reports || []);
            } catch { showToast('加载失败', 'error'); }
        }

        function renderReports(reports) {
            const tbody = document.getElementById('reportsBody');
            if (!reports.length) { tbody.innerHTML = '<tr><td colspan="5" class="text-center">暂无报告</td></tr>'; return; }
            tbody.innerHTML = reports.map(r => `
                <tr>
                    <td>${r.id}</td>
                    <td>${r.task_name || '-'}</td>
                    <td>${r.report_type || '-'}</td>
                    <td>${formatDateTime(r.created_at)}</td>
                    <td><button class="btn btn-sm btn-primary" onclick="viewReport(${r.id})">查看</button></td>
                </tr>
            `).join('');
        }

        function viewReport(id) { showToast('报告查看功能开发中', 'info'); }
        function logout() { if (confirm('退出?')) { localStorage.clear(); window.location.href = 'index.html'; } }
    </script>
</body>
</html>

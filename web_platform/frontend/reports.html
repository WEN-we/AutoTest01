                    </button>
                    <div id="pageButtons" class="btn-group btn-group-sm"></div>
                    <button class="btn btn-outline-secondary" id="btnNextPage" onclick="goToPage(currentPage + 1)" title="下一页">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                    <button class="btn btn-outline-secondary" id="btnLastPage" onclick="goToPage(totalPagesCount)" title="跳转到最后一页">

<script src="/static/js/user-menu.js"></script>
    <script>
        let currentPage = 1;
        let totalPagesCount = 1;
        const pageSize = 20;
        let allReports = [];

        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/index.html';
                return false;
            }
            return true;
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        }

        function getToken() {
            return localStorage.getItem('token');
        }

        async function loadReports() {
            try {
                const res = await fetch(`${API_BASE}/reports?page=1&page_size=9999`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await res.json();

                if (data.code === 200) {
                    allReports = data.data.reports || [];
                    totalPagesCount = Math.max(1, Math.ceil(allReports.length / pageSize));
                    if (currentPage > totalPagesCount) currentPage = totalPagesCount;
                    renderCurrentPage();
                } else {
                    showToast('获取报告失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
                document.getElementById('reportsBody').innerHTML = '<tr><td colspan="10" class="text-center text-danger">加载失败</td></tr>';
            }
        }

        function renderCurrentPage() {
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageReports = allReports.slice(start, end);
            renderReports(pageReports);
            renderPagination();
        }

        function goToPage(page) {
            if (page < 1 || page > totalPagesCount) return;
            currentPage = page;
            renderCurrentPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderPagination() {
            const container = document.getElementById('paginationContainer');
            const totalRecords = document.getElementById('totalRecords');
            const currentPageDisplay = document.getElementById('currentPageDisplay');
            const totalPagesEl = document.getElementById('totalPages');
            const btnFirst = document.getElementById('btnFirstPage');
            const btnPrev = document.getElementById('btnPrevPage');
            const btnNext = document.getElementById('btnNextPage');
            const btnLast = document.getElementById('btnLastPage');
            const pageButtons = document.getElementById('pageButtons');

            if (allReports.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'flex';
            totalRecords.textContent = allReports.length;
            currentPageDisplay.textContent = currentPage;
            totalPagesEl.textContent = totalPagesCount;

            btnFirst.disabled = currentPage <= 1;
            btnPrev.disabled = currentPage <= 1;
            btnNext.disabled = currentPage >= totalPagesCount;
            btnLast.disabled = currentPage >= totalPagesCount;

            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPagesCount, startPage + 4);
            if (endPage - startPage < 4) {
                startPage = Math.max(1, endPage - 4);
            }

            let btnsHtml = '';
            for (let i = startPage; i <= endPage; i++) {
                const active = i === currentPage ? 'btn-primary' : 'btn-outline-secondary';
                btnsHtml += `<button class="btn ${active}" onclick="goToPage(${i})">${i}</button>`;
            }
            pageButtons.innerHTML = btnsHtml;
        }

        function getSelectedReportIds() {
            const checkboxes = document.querySelectorAll('.report-checkbox:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function restoreReportCheckboxes(selectedIds) {
            if (!selectedIds || selectedIds.length === 0) return;
            const checkboxes = document.querySelectorAll('.report-checkbox');
            checkboxes.forEach(cb => {
                if (selectedIds.includes(cb.value)) {
                    cb.checked = true;
                }
            });
            updateBatchDeleteButton();
        }

        function renderReports(reports) {
            const tbody = document.getElementById('reportsBody');
            const selectedIds = getSelectedReportIds();

            if (!reports || !reports.length) {
                tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted">暂无报告</td></tr>';
                return;
            }

            const globalOffset = (currentPage - 1) * pageSize;

            tbody.innerHTML = reports.map((r, index) => {
                const summary = r.summary || {};
                const passed = summary.passed || r.passed || 0;
                const failed = summary.failed || r.failed || 0;
                const skipped = summary.skipped || r.skipped || 0;
                const duration = summary.duration || r.duration || 0;
                const passRate = r.pass_rate || (summary.total > 0 ? Math.round((passed / summary.total) * 100) : 0);
                const displayId = allReports.length - globalOffset - index;
                const reportId = r.id || r.execution_id;

                return `
                    <tr class="selectable-row" data-report-id="${reportId}">
                        <td>
                            <input type="checkbox" class="report-checkbox" value="${reportId}" onchange="updateBatchDeleteButton()">
                        </td>
                        <td><code>#${displayId}</code></td>
                        <td><code style="font-size: 11px;">${r.execution_id ? r.execution_id.substring(0, 8) + '...' : '-'}</code></td>
                        <td>
                            <div>${r.task_name || '-'}</div>
                            <small class="text-muted">${r.report_name || '-'}</small>
                        </td>
                        <td><span class="badge badge-api">${r.report_type || 'allure'}</span></td>
                        <td>
                            <span class="badge bg-success">${passed}通过</span>
                            ${failed > 0 ? `<span class="badge bg-danger">${failed}失败</span>` : ''}
                            ${skipped > 0 ? `<span class="badge bg-secondary">${skipped}跳过</span>` : ''}
                        </td>
                        <td>${formatDuration(duration)}</td>
                        <td>
                            <div class="progress" style="width: 80px; height: 20px;">
                                <div class="progress-bar ${passRate >= 80 ? 'bg-success' : passRate >= 50 ? 'bg-warning' : 'bg-danger'}"
                                     role="progressbar" style="width: ${passRate}%">${passRate}%</div>
                            </div>
                        </td>
                        <td>${formatTime(r.created_at)}</td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-primary" onclick="event.stopPropagation(); viewReportDetail('${reportId}')" title="查看报告详情">
                                    <i class="bi bi-eye"></i>
                                </button>
                                <button class="btn btn-outline-danger" onclick="event.stopPropagation(); deleteSingleReport('${reportId}')" title="删除此报告及关联数据">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            restoreReportCheckboxes(selectedIds);

            tbody.querySelectorAll('.selectable-row').forEach(row => {
                row.addEventListener('click', function(e) {
                    if (e.target.closest('input[type="checkbox"]') || e.target.closest('.btn-group')) {
                        return;
                    }
                    const checkbox = this.querySelector('.report-checkbox');
                    if (checkbox) {
                        checkbox.checked = !checkbox.checked;
                        updateBatchDeleteButton();
                    }
                });
            });

            if (typeof initTooltips === 'function') {
                initTooltips();
            }
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.report-checkbox');
            checkboxes.forEach(cb => cb.checked = selectAll.checked);
            updateBatchDeleteButton();
        }

        function syncSelectAllCheckbox() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.report-checkbox');

            if (!selectAll) return;

            const allChecked = checkboxes.length > 0 && Array.from(checkboxes).every(cb => cb.checked);
            const noneChecked = checkboxes.length === 0 || Array.from(checkboxes).every(cb => !cb.checked);

            if (allChecked) {
                selectAll.checked = true;
                selectAll.indeterminate = false;
            } else if (noneChecked) {
                selectAll.checked = false;
                selectAll.indeterminate = false;
            } else {
                selectAll.indeterminate = true;
            }
        }

        function updateBatchDeleteButton() {
            const selected = document.querySelectorAll('.report-checkbox:checked');
            const batchBtn = document.getElementById('batchDeleteBtn');
            const selectedCount = document.getElementById('selectedCount');

            if (!batchBtn || !selectedCount) return;

            if (selected.length > 0) {
                batchBtn.style.display = 'inline-block';
                selectedCount.textContent = selected.length;
            } else {
                batchBtn.style.display = 'none';
                selectedCount.textContent = '0';
            }
            syncSelectAllCheckbox();
        }

        async function batchDeleteReports() {
            const selected = document.querySelectorAll('.report-checkbox:checked');
            if (selected.length === 0) {
                showToast('请先选择要删除的报告', 'warning');
                return;
            }

            if (!confirm(`确定要删除选中的 ${selected.length} 条报告记录吗？此操作不可恢复，将同时删除关联的执行记录和用例结果。`)) {
                updateBatchDeleteButton();
                return;
            }

            const reportIds = Array.from(selected).map(cb => cb.value);

            try {
                const res = await fetch(`${API_BASE}/reports/batch-delete`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ report_ids: reportIds })
                });

                const data = await res.json();
                if (data.code === 200) {
                    showToast(data.message || '删除成功', 'success');
                    loadReports();
                } else {
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        async function deleteSingleReport(reportId) {
            if (!confirm('确定要删除这条报告记录吗？此操作不可恢复，将同时删除关联的执行记录和用例结果。')) {
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/reports/batch-delete`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ report_ids: [reportId] })
                });

                const data = await res.json();
                if (data.code === 200) {
                    showToast('删除成功', 'success');
                    loadReports();
                } else {
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        async function viewReportDetail(reportId) {
            try {
                const res = await fetch(`${API_BASE}/reports/${encodeURIComponent(reportId)}`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });

                const data = await res.json();
                if (data.code === 200 && data.data) {
                    showReportDetailModal(data.data);
                } else {
                    showToast('获取报告详情失败', 'error');
                }
            } catch (error) {
                showToast('获取报告详情失败: ' + error.message, 'error');
            }
        }

        function showReportDetailModal(report) {
            const summary = report.summary || {};
            const passed = summary.passed || report.passed || 0;
            const failed = summary.failed || report.failed || 0;
            const skipped = summary.skipped || report.skipped || 0;
            const errors = summary.errors || report.errors || 0;
            const total = summary.total || report.total || 0;
            const duration = summary.duration || report.duration || 0;
            const passRate = report.pass_rate || (total > 0 ? Math.round((passed / total) * 100) : 0);

            const modalHtml = `
                <div class="modal fade" id="reportDetailModal" tabindex="-1">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">测试报告详情 - ${report.task_name || '未知任务'}</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="row mb-3">
                                    <div class="col-md-3"><strong>执行ID:</strong></div>
                                    <div class="col-md-9"><code>${report.execution_id || '-'}</code></div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-3"><strong>报告类型:</strong></div>
                                    <div class="col-md-9">${report.report_type || 'allure'}</div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-3"><strong>执行耗时:</strong></div>
                                    <div class="col-md-9">${formatDuration(duration)}</div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-3"><strong>通过率:</strong></div>
                                    <div class="col-md-9">
                                        <div class="progress" style="height: 25px;">
                                            <div class="progress-bar ${passRate >= 80 ? 'bg-success' : passRate >= 50 ? 'bg-warning' : 'bg-danger'}"
                                                 role="progressbar" style="width: ${passRate}%">${passRate}%</div>
                                        </div>
                                    </div>
                                </div>
                                <hr>
                                <h6>测试结果统计</h6>
                                <div class="row text-center">
                                    <div class="col-md-3">
                                        <div class="card bg-success text-white">
                                            <div class="card-body py-2">
                                                <h3 class="mb-0">${passed}</h3>
                                                <small>通过</small>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="card bg-danger text-white">
                                            <div class="card-body py-2">
                                                <h3 class="mb-0">${failed}</h3>
                                                <small>失败</small>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="card bg-warning text-white">
                                            <div class="card-body py-2">
                                                <h3 class="mb-0">${skipped}</h3>
                                                <small>跳过</small>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="card bg-info text-white">
                                            <div class="card-body py-2">
                                                <h3 class="mb-0">${errors}</h3>
                                                <small>错误</small>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                ${total > 0 ? `
                                <hr>
                                <h6>摘要数据</h6>
                                <pre class="bg-light p-3 rounded" style="max-height: 200px; overflow-y: auto;"><code>${escapeHtml(JSON.stringify(summary, null, 2))}</code></pre>
                                ` : ''}
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const existingModal = document.getElementById('reportDetailModal');
            if (existingModal) existingModal.remove();

            const modalContainer = document.createElement('div');
            modalContainer.innerHTML = modalHtml;
            document.body.appendChild(modalContainer);

            const modalEl = document.getElementById('reportDetailModal');
            const modal = new bootstrap.Modal(modalEl);
            modal.show();

            modalEl.addEventListener('hidden.bs.modal', function () {
                modalEl.remove();
            });
        }

        function formatDuration(seconds) {
            if (seconds === null || seconds === undefined) return '-';
            if (seconds === 0) return '0秒';
            if (seconds < 60) return `${seconds}秒`;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}分${secs}秒`;
        }

        function formatTime(timeStr) {
            if (!timeStr) return '-';

            // 处理各种时间格式
            let date;
            const timeValue = String(timeStr).trim();

            // 尝试直接解析
            date = new Date(timeValue);

            // 如果解析失败，尝试替换空格为T（MySQL格式: 2026-05-21 16:12:28）
            if (isNaN(date.getTime()) && timeValue.includes(' ')) {
                date = new Date(timeValue.replace(' ', 'T'));
            }

            // 如果仍然解析失败，返回原始值
            if (isNaN(date.getTime())) {
                return timeValue;
            }

            // 检查时间字符串是否包含时区信息
            const hasTimezone = /[+-]\d{2}:\d{2}$|Z$/.test(timeValue);

            // 如果没有时区信息，说明是本地时间，需要补偿时区偏移
            // 因为 JavaScript 会将无时区的字符串视为 UTC，然后转换为本地时间
            if (!hasTimezone) {
                const offset = date.getTimezoneOffset() * 60000; // 转换为毫秒
                date = new Date(date.getTime() + offset);
            }

            return date.toLocaleString('zh-CN');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (checkAuth()) {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const displayName = user.nickname || user.username || '管理员';
                document.getElementById('currentUser').textContent = displayName;
                const userFullnameEl = document.getElementById('userFullname');
                const userEmailEl = document.getElementById('userEmail');
                if (userFullnameEl) userFullnameEl.textContent = displayName;
                if (userEmailEl) userEmailEl.textContent = user.email || '-';
                const avatarPlaceholder = document.querySelector('.user-avatar-placeholder');
                const avatarLargePlaceholder = document.querySelector('.user-avatar-large-placeholder');
                const firstLetter = (displayName.charAt(0) || 'A').toUpperCase();
                if (avatarPlaceholder) avatarPlaceholder.textContent = firstLetter;
                if (avatarLargePlaceholder) avatarLargePlaceholder.textContent = firstLetter;
                loadReports();

                const hash = window.location.hash;
                if (hash.startsWith('#detail=')) {
                    const reportId = decodeURIComponent(hash.substring('#detail='.length));
                    setTimeout(() => viewReportDetail(reportId), 800);
                }
            }
        });

        setInterval(() => {
            if (!document.hidden) {
                loadReports();
            }
        }, 5000);
    </script>
</body>
</html>

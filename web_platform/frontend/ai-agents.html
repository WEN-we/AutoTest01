<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('app_theme');
            if (savedTheme) {
                const theme = savedTheme === 'system' 
                    ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                    : savedTheme;
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能体 - 自动化测试平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard.html">
                <div class="brand-logo">
                    <i class="bi bi-robot"></i>
                </div>
                <span class="brand-text">自动化测试平台</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard.html"><i class="bi bi-house me-1"></i>首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/tasks.html"><i class="bi bi-list-task me-1"></i>测试任务</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/ai-models.html"><i class="bi bi-cpu me-1"></i>AI模型</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/ai-agents.html"><i class="bi bi-robot me-1"></i>AI智能体</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reports.html"><i class="bi bi-file-earmark-text me-1"></i>测试报告</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="integrationsDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-plug me-1"></i>第三方集成
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/integrations.html"><i class="bi bi-gear me-2"></i>集成配置</a></li>
                            <li><a class="dropdown-item" href="/jenkins.html"><i class="bi bi-hdd me-2"></i>Jenkins</a></li>
                            <li><a class="dropdown-item" href="/zentao.html"><i class="bi bi-kanban me-2"></i>禅道</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
            <div class="d-flex align-items-center">
                <div class="dropdown me-3">
                    <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" onclick="updateRecentMonitorsDropdown()" title="查看最近执行的监控记录">
                        <i class="bi bi-clock-history me-1"></i>最近监控
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" id="recentMonitorsDropdown" style="min-width: 250px;">
                        <li><span class="dropdown-item-text text-muted small">暂无最近监控记录</span></li>
                    </ul>
                </div>
                <div class="theme-dropdown-wrapper me-3">
                    <button class="theme-toggle-btn">
                        <span class="theme-icon"></span>
                        <span class="theme-label"></span>
                        <i class="bi bi-chevron-down ms-2" style="font-size: 12px;"></i>
                    </button>
                    <div class="theme-dropdown-menu">
                        <div class="theme-dropdown-header">主题模式</div>
                        
                        <div class="theme-option" data-theme="light">
                            <div class="theme-option-icon">☀️</div>
                            <div class="theme-option-content">
                                <div class="theme-option-title">日间模式</div>
                                <div class="theme-option-desc">明亮清爽的浅色主题</div>
                            </div>
                            <div class="theme-option-check">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </div>
                        </div>
                        
                        <div class="theme-option" data-theme="dark">
                            <div class="theme-option-icon">🌙</div>
                            <div class="theme-option-content">
                                <div class="theme-option-title">夜间模式</div>
                                <div class="theme-option-desc">护眼舒适的深色主题</div>
                            </div>
                            <div class="theme-option-check">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </div>
                        </div>
                        
                        <div class="theme-option" data-theme="system">
                            <div class="theme-option-icon">💻</div>
                            <div class="theme-option-content">
                                <div class="theme-option-title">跟随系统</div>
                                <div class="theme-option-desc">自动跟随系统设置切换</div>
                            </div>
                            <div class="theme-option-check">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="user-menu-wrapper">
                    <button class="user-menu-btn">
                        <img class="user-avatar" src="" alt="头像" style="display: none;">
                        <div class="user-avatar-placeholder">A</div>
                        <span class="user-name" id="currentUser">管理员</span>
                        <i class="bi bi-chevron-down chevron"></i>
                    </button>
                    <div class="user-menu-dropdown">
                        <div class="user-menu-header">
                            <div class="user-info">
                                <img class="user-avatar-large" src="" alt="头像" style="display: none;">
                                <div class="user-avatar-large-placeholder">A</div>
                                <div class="user-details">
                                    <div class="user-fullname" id="userFullname">管理员</div>
                                    <div class="user-email" id="userEmail">-</div>
                                </div>
                            </div>
                            <button class="edit-profile-btn" id="editProfileBtn">编辑个人资料</button>
                        </div>
                        
                        <button class="user-menu-item" id="uploadAvatarBtn">
                            <i class="bi bi-camera menu-icon"></i>
                            <span class="menu-text">上传头像</span>
                        </button>
                        
                        <button class="user-menu-item" id="changeUsernameBtn">
                            <i class="bi bi-pencil menu-icon"></i>
                            <span class="menu-text">修改用户名</span>
                        </button>
                        
                        <button class="user-menu-item" id="changePasswordBtn">
                            <i class="bi bi-lock menu-icon"></i>
                            <span class="menu-text">修改密码</span>
                        </button>
                        
                        <div class="user-menu-divider"></div>
                        
                        <button class="user-menu-item user-menu-item-danger" id="deleteAccountBtn">
                            <i class="bi bi-trash menu-icon"></i>
                            <span class="menu-text">注销账号</span>
                        </button>
                        
                        <div class="user-menu-footer">
                            <button class="user-menu-item" id="logoutBtn">
                                <i class="bi bi-box-arrow-right menu-icon"></i>
                                <span class="menu-text">退出登录</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2><i class="bi bi-robot me-2"></i>AI智能体</h2>
                <p class="text-muted mb-0">专业的自动化测试智能体管理</p>
            </div>
            <button class="btn btn-primary" onclick="showCreateAgentModal()">
                <i class="bi bi-plus-circle me-2"></i>创建智能体
            </button>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-number" id="totalAgents">0</div>
                            <div class="stat-label">总计智能体</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-number" id="activeAgents">0</div>
                            <div class="stat-label">活跃智能体</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-number" id="idleAgents">0</div>
                            <div class="stat-label">空闲智能体</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-number" id="availableSkills">0</div>
                            <div class="stat-label">可用技能</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>智能体列表</h5>
                <button class="btn btn-outline-primary btn-sm" onclick="loadAgents()">
                    <i class="bi bi-arrow-clockwise me-1"></i>刷新
                </button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>当前技能</th>
                                <th>状态</th>
                                <th>创建时间</th>
                                <th>最后活跃</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="agentsTableBody">
                            <tr>
                                <td colspan="7" class="text-center py-4 text-muted">
                                    <i class="bi bi-inbox fs-1 mb-2 d-block"></i>
                                    暂无智能体，请点击上方按钮创建
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createAgentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>创建智能体</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createAgentForm">
                        <div class="mb-3">
                            <label class="form-label">智能体名称</label>
                            <input type="text" class="form-control" id="agentName" placeholder="例如：测试助手1号" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">初始技能</label>
                            <select class="form-select" id="agentSkill">
                                <option value="test_expert">测试专家</option>
                                <option value="code_helper">代码助手</option>
                                <option value="report_expert">报告专家</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="createAgent()">创建</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/crypto.js"></script>
<script src="/static/js/user-menu.js"></script>
    <script src="/static/js/ai-agents.js"></script>
</body>
</html>

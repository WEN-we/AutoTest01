# 激活的环境（dev/测试/prod），改这里就能切换环境
active_env: test

# 开发环境
dev:
  base_api_url: http://dev-api.ecommerce.com
  base_ui_url: http://dev-web.ecommerce.com

  android_api_url: http://dev-api.ecommerce.com/app
  ios_api_url: http://dev-api.ecommerce.com/ios
  harmony_api_url: http://dev-api.ecommerce.com/harmony  # 鸿蒙
  windows_api_url: http://dev-api.ecommerce.com/pc
  linux_server_url: 192.168.1.100

  db:
    host: "${DB_HOST:-localhost}"        # 数据库地址/主机名
    port: 3306                           # 数据库端口（MySQL默认3306）
    user: "${DB_USER:-root}"             # 数据库登录用户名
    pwd: "${DB_PASSWORD}"                # 数据库登录密码（从环境变量读取，禁止硬编码）

# 测试环境（电商平台）
test:
  base_api_url: https://rica-names-tucson-story.trycloudflare.com/api
  base_ui_url: https://rica-names-tucson-story.trycloudflare.com
  android_api_url: https://rica-names-tucson-story.trycloudflare.com/api/app
  ios_api_url: https://rica-names-tucson-story.trycloudflare.com/api/ios
  harmony_api_url: https://rica-names-tucson-story.trycloudflare.com/api/harmony
  windows_api_url: https://rica-names-tucson-story.trycloudflare.com/api/pc
  linux_server_url: 192.168.138.129

  db:
    host: "${DB_HOST:-localhost}"
    port: 3306
    user: "${DB_USER:-root}"
    pwd: "${DB_PASSWORD}"
    database: test_auto

# 生产环境
prod:
  base_api_url: http://prod-api.ecommerce.com
  base_ui_url: http://prod-web.ecommerce.com

  android_api_url: http://prod-api.ecommerce.com/app
  ios_api_url: http://prod-api.ecommerce.com/ios
  harmony_api_url: http://prod-api.ecommerce.com/harmony  # 鸿蒙
  windows_api_url: http://prod-api.ecommerce.com/pc
  linux_server_url: 10.0.0.100

  # 数据库配置
  db:
    host: "${PROD_DB_HOST:-localhost}"   # 数据库地址/主机名
    port: 3306                           # 数据库端口（MySQL默认3306）
    user: "${PROD_DB_USER:-root}"        # 数据库登录用户名
    pwd: "${PROD_DB_PASSWORD}"           # 数据库登录密码（从环境变量读取，禁止硬编码）

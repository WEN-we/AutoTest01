# Web 端登录用例
login_web:
  - case_name: 正确用户名密码登录
    username: 'admin'
    password: '123456'
    expected_result: '登录成功'

  - case_name: 空用户名登录
    username: ""
    password: '123456'
    expected_result: '用户名不能少于5个字符'

  - case_name: 空密码登录
    username: 'admin'
    password: ""
    expected_result: '密码不能少于5个字符'


# Windows 桌面登录用例
login_windows:
  - case_name: 正确用户名密码登录
    username: 'win_admin'
    password: 'win123456'
    expected_result: '登录成功'

  - case_name: 空用户名登录
    username: ""
    password: 'win123456'
    expected_result: '用户名不能为空'

  - case_name: 空密码登录
    username: 'win_admin'
    password: ""
    expected_result: '密码不能为空'



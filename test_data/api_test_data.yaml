# ====================== Web 端接口（你原有） ======================
user_login_api:
  - case_name: Web-正确用户名密码登录
    method: POST
    url: /api/admin/login
    json:
      userName: "admin"
      password: "123456"
    expected_code: 200
    expected_msg: "登录成功"

  - case_name: Web-错误密码登录
    method: POST
    url: /api/admin/login
    json:
      userName: "admin"
      password: "wrong_password"
    expected_code: 200
    expected_msg: "密码错误"

  - case_name: Web-空密码登录
    method: POST
    url: /api/admin/login
    json:
      userName: "admin"
      password: ""
    expected_code: 200
    expected_msg: "密码不能为空"



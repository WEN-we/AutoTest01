# ====================== 电商平台 API 测试数据 ======================

# 用户注册 API
ec_user_register_api:
  - case_name: 正常注册普通用户
    method: POST
    url: "/api/register"
    json:
      username: 'newuser001'
      email: 'newuser001@test.com'
      password: 'Test@1234'
      confirm_password: 'Test@1234'
      role: 'user'
    expected_code: 200
    expected_msg: '注册成功'

  - case_name: 注册商家用户
    method: POST
    url: "/api/register"
    json:
      username: 'newmerchant001'
      email: 'newmerchant001@test.com'
      password: 'Test@1234'
      confirm_password: 'Test@1234'
      role: 'merchant'
    expected_code: 200
    expected_msg: '注册成功'

  - case_name: 注册用户名已存在
    method: POST
    url: "/api/register"
    json:
      username: 'testuser'
      email: 'duplicate@test.com'
      password: 'Test@1234'
      confirm_password: 'Test@1234'
      role: 'user'
    expected_code: 200
    expected_msg: '用户名已存在'

  - case_name: 注册两次密码不一致
    method: POST
    url: "/api/register"
    json:
      username: 'newuser002'
      email: 'newuser002@test.com'
      password: 'Test@1234'
      confirm_password: 'Different@1234'
      role: 'user'
    expected_code: 200
    expected_msg: '两次密码不一致'

  - case_name: 注册邮箱为空
    method: POST
    url: "/api/register"
    json:
      username: 'newuser003'
      email: ''
      password: 'Test@1234'
      confirm_password: 'Test@1234'
      role: 'user'
    expected_code: 200
    expected_msg: '邮箱不能为空'

# 用户登录 API
ec_user_login_api:
  - case_name: 正确用户名密码登录
    method: POST
    url: "/api/login"
    json:
      username: 'testuser'
      password: 'Test@1234'
    expected_code: 200
    expected_msg: '登录成功'

  - case_name: 错误密码登录
    method: POST
    url: "/api/login"
    json:
      username: 'testuser'
      password: 'wrong_password'
    expected_code: 200
    expected_msg: '用户名或密码错误'

  - case_name: 空用户名登录
    method: POST
    url: "/api/login"
    json:
      username: ''
      password: 'Test@1234'
    expected_code: 200
    expected_msg: '用户名不能为空'

  - case_name: 空密码登录
    method: POST
    url: "/api/login"
    json:
      username: 'testuser'
      password: ''
    expected_code: 200
    expected_msg: '密码不能为空'

# 商品列表 API
ec_product_list_api:
  - case_name: 获取商品列表
    method: GET
    url: "/api/products"
    params:
      page: 1
      page_size: 20
    expected_code: 200
    expected_msg: '成功'

  - case_name: 获取第二页商品列表
    method: GET
    url: "/api/products"
    params:
      page: 2
      page_size: 20
    expected_code: 200
    expected_msg: '成功'

  - case_name: 按分类获取商品列表
    method: GET
    url: "/api/products"
    params:
      category: '电子数码'
      page: 1
      page_size: 20
    expected_code: 200
    expected_msg: '成功'

# 商品搜索 API
ec_product_search_api:
  - case_name: 搜索手机
    method: GET
    url: "/api/products/search"
    params:
      keyword: '手机'
    expected_code: 200
    expected_msg: '成功'

  - case_name: 搜索耳机
    method: GET
    url: "/api/products/search"
    params:
      keyword: '耳机'
    expected_code: 200
    expected_msg: '成功'

  - case_name: 搜索不存在的商品
    method: GET
    url: "/api/products/search"
    params:
      keyword: '不存在的商品xyz123'
    expected_code: 200
    expected_msg: '成功'

  - case_name: 按价格区间搜索商品
    method: GET
    url: "/api/products/search"
    params:
      keyword: '手机'
      min_price: 100
      max_price: 5000
    expected_code: 200
    expected_msg: '成功'

# 购物车 API
ec_cart_api:
  - case_name: 添加商品到购物车
    method: POST
    url: "/api/cart/add"
    json:
      product_id: 1
      quantity: 1
    expected_code: 200
    expected_msg: '添加成功'

  - case_name: 修改购物车商品数量
    method: PUT
    url: "/api/cart/update"
    json:
      product_id: 1
      quantity: 2
    expected_code: 200
    expected_msg: '更新成功'

  - case_name: 获取购物车列表
    method: GET
    url: "/api/cart"
    expected_code: 200
    expected_msg: '成功'

  - case_name: 删除购物车商品
    method: DELETE
    url: "/api/cart/remove"
    json:
      product_id: 1
    expected_code: 200
    expected_msg: '删除成功'

  - case_name: 清空购物车
    method: DELETE
    url: "/api/cart/clear"
    expected_code: 200
    expected_msg: '清空成功'

# 订单 API
ec_order_api:
  - case_name: 创建订单
    method: POST
    url: "/api/orders"
    json:
      recipient: '张三'
      phone: '13800138000'
      address: '北京市朝阳区测试路1号'
      payment_method: 'alipay'
      items:
        - product_id: 1
          quantity: 1
    expected_code: 200
    expected_msg: '下单成功'

  - case_name: 获取订单列表
    method: GET
    url: "/api/orders"
    params:
      page: 1
      page_size: 20
    expected_code: 200
    expected_msg: '成功'

  - case_name: 获取订单详情
    method: GET
    url: "/api/orders/1"
    expected_code: 200
    expected_msg: '成功'

  - case_name: 取消订单
    method: PUT
    url: "/api/orders/1/cancel"
    expected_code: 200
    expected_msg: '取消成功'

  - case_name: 立即支付订单
    method: POST
    url: "/api/orders/1/pay"
    json:
      payment_method: 'alipay'
    expected_code: 200
    expected_msg: '支付成功'

  - case_name: 确认收货
    method: PUT
    url: "/api/orders/1/confirm"
    expected_code: 200
    expected_msg: '确认成功'

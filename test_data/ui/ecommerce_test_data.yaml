# ====================== 电商平台 UI 测试数据 ======================

# 电商登录用例
ec_login:
  - case_name: 正确用户名密码登录
    username: 'testuser'
    password: 'Test@1234'
    captcha: '1234'
    expected_result: '登录成功'

  - case_name: 错误密码登录
    username: 'testuser'
    password: 'wrong_password'
    captcha: '1234'
    expected_result: '用户名或密码错误'

  - case_name: 空用户名登录
    username: ''
    password: 'Test@1234'
    captcha: '1234'
    expected_result: '用户名不能为空'

  - case_name: 空密码登录
    username: 'testuser'
    password: ''
    captcha: '1234'
    expected_result: '密码不能为空'

# 商品搜索用例
ec_product_search:
  - case_name: 搜索手机
    keyword: '手机'
    expected_min_count: 1

  - case_name: 搜索耳机
    keyword: '耳机'
    expected_min_count: 1

  - case_name: 搜索不存在的商品
    keyword: '不存在的商品xyz123'
    expected_min_count: 0

# 商品分类筛选用例
ec_product_category:
  - case_name: 筛选电子数码分类
    category: '电子数码'
    expected_min_count: 1

  - case_name: 筛选图书分类
    category: '图书'
    expected_min_count: 1

  - case_name: 筛选服装分类
    category: '服装'
    expected_min_count: 1

  - case_name: 筛选家居厨房分类
    category: '家居厨房'
    expected_min_count: 1

# 价格筛选用例
ec_price_filter:
  - case_name: 筛选低价位商品
    min_price: 0
    max_price: 100
    expected_min_count: 1

  - case_name: 筛选中价位商品
    min_price: 100
    max_price: 500
    expected_min_count: 1

  - case_name: 筛选高价位商品
    min_price: 500
    max_price: 5000
    expected_min_count: 1

  - case_name: 筛选无匹配价格区间
    min_price: 999999
    max_price: 9999999
    expected_min_count: 0

# 购物车用例
ec_cart:
  - case_name: 添加商品到购物车
    product_index: 0
    expected_result: '加入成功'

  - case_name: 修改购物车商品数量增加
    item_index: 0
    operation: 'increase'
    expected_qty: 2

  - case_name: 修改购物车商品数量减少
    item_index: 0
    operation: 'decrease'
    expected_qty: 1

  - case_name: 删除购物车商品
    item_index: 0
    expected_result: '删除成功'

# 下单用例
ec_checkout:
  - case_name: 支付宝下单
    recipient: '张三'
    phone: '13800138000'
    address: '北京市朝阳区测试路1号'
    payment_method: 'alipay'
    expected_result: '下单成功'

  - case_name: 微信支付下单
    recipient: '李四'
    phone: '13900139000'
    address: '上海市浦东新区测试路2号'
    payment_method: 'wechat'
    expected_result: '下单成功'

  - case_name: 信用卡下单
    recipient: '王五'
    phone: '13700137000'
    address: '广州市天河区测试路3号'
    payment_method: 'card'
    expected_result: '下单成功'

  - case_name: 借记卡下单
    recipient: '赵六'
    phone: '13600136000'
    address: '深圳市南山区测试路4号'
    payment_method: 'debit'
    expected_result: '下单成功'

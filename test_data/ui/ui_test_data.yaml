# Web 端登录用例（本地）
login_web:
  - case_name: 正确用户名密码登录
    username: 'admin'
    password: '123456'
    expected_result: '登录成功'

  - case_name: 空用户名登录
    username: ""
    password: '123456'
    expected_result: '参数不能为空'

  - case_name: 空密码登录
    username: 'admin'
    password: ""
    expected_result: '参数不能为空'

  - case_name: 用户名错误登录
    username: 'adn'
    password: "123456"
    expected_result: '用户名或密码错误'

  - case_name: 密码错误登录
    username: 'admin'
    password: "123"
    expected_result: '用户名或密码错误'


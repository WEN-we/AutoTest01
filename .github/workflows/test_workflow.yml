name: 电商自动化测试CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 安装Python
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      # 执行测试
      - name: 执行接口测试
        run: pytest tests/test_api/ --alluredir=allure-results

      - name: 执行UI测试（无头模式）
        run: pytest tests/test_ui/ --alluredir=allure-results

      # 【关键】安装Allure命令行工具（官方源，稳定）
      - name: 安装Allure
        uses: simple-elf/allure-action@v1
        with:
          install_only: true

      # 生成Allure报告
      - name: 生成Allure报告
        run: allure generate allure-results -o allure-report --clean
      
      # 上传报告
      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
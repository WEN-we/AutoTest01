name: 电商自动化测试CI

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖（修复 Playwright 崩溃问题）
        run: |
          sudo apt-get update
          sudo apt-get install -y libwoff1 libgles2-mesa libharfbuzz-bin libwebp-dev libopenjp2-7 libopus0 libegl1 libshm0

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: 运行 接口 + UI 测试
        run: pytest tests/ --alluredir=allure-results

      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
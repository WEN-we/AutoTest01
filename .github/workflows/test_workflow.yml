name: 电商自动化测试CI

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🔥 强制安装所有依赖，不依赖 requirements.txt 路径
      - name: 安装所有依赖（绝对不缺包）
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html requests PyYAML playwright loguru python-dotenv allure-pytest
          playwright install chromium --with-deps

      # 🔥 运行测试，失败就变红
      - name: 运行全部测试
        run: pytest tests/ --alluredir=allure-results

      # 🔥 无论成功失败，都上传报告
      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
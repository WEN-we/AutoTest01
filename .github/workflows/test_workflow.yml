name: 电商自动化测试CI

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest allure-pytest playwright
          playwright install chromium

      # 【关键】运行测试，失败就会标红
      - name: 运行所有测试（接口+UI）
        run: pytest tests/ --alluredir=allure-results

      # 【关键】无论成功失败，都上传结果（最重要！）
      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
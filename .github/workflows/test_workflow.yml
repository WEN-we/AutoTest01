name: 电商自动化测试CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest allure-pytest playwright
          playwright install chromium

      - name: 运行接口测试
        run: pytest tests/test_api/ --alluredir=results || true

      - name: 运行UI测试
        run: pytest tests/test_ui/ --alluredir=results || true

      - name: 上传测试结果
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: results
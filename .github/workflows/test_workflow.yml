name: 电商自动化测试CI

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1 libasound2
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      # 👇 直接生成 pytest-html 简单报告！100%成功！
      - name: 运行接口+UI测试 + 生成HTML报告
        run: pytest tests/ --html=report.html --self-contained-html || true

      # 👇 直接上传报告
      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 测试报告
          path: report.html
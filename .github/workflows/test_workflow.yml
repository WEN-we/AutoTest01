name: 电商自动化测试CI

# 触发条件：push或pr到main分支
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4
      
      # 安装Python
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      
      # 执行测试
      - name: 执行接口测试
        run: pytest tests/test_api/ --alluredir=allure-results
      
      # 执行UI测试（无头模式）
      - name: 执行UI测试
        run: pytest tests/test_ui/ --alluredir=allure-results
      
      # 生成Allure报告
      - name: 生成Allure报告
        uses: simple-elf/allure-report-action@v1.7
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_version: 2.24.0
      
      # 上传报告
      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
name: 电商自动化测试CI
on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1 libasound2

      - name: 安装Python依赖（仅安装Web+接口必备）
        run: |
          python -m pip install --upgrade pip
          pip install pytest playwright requests allure-pytest pytest-html pyyaml python-dotenv loguru
          playwright install chromium

      - name: 运行测试【只跑API和UI，彻底跳过其他所有用例】
        run: |
          pytest tests/test_api/ tests/test_ui/ --html=report.html --self-contained-html

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 测试报告
          path: report.html
name: 电商自动化测试CI

permissions:
  contents: write

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1 libasound2

      # ======================
      # 依赖我已经全部加好了！
      # ======================
      - name: 安装 Python 依赖（含 allure + html + playwright）
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          playwright install chromium

      - name: 运行测试 + 生成 HTML + Allure 报告
        run: |
          pytest tests/test_api/ tests/test_ui/ \
            --html=report.html --self-contained-html \
            --alluredir=allure-results

      # 可下载 HTML 报告
      - name: 上传 HTML 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 测试报告HTML
          path: report.html

      # 可下载 Allure 原始数据
      - name: 上传 Allure 结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      # 生成 Allure 在线报告
      - name: 生成 Allure 报告
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          gh_pages: gh-pages
          allure_results: allure-results
          allure_history: allure-history

      # 发布在线查看
      - name: 发布 GitHub Pages 在线报告
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
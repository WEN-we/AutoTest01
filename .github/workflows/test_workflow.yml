name: 电商自动化测试CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2. 安装Python环境
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 3. 安装项目依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      # 4. 执行接口自动化测试
      - name: 执行接口测试
        run: pytest tests/test_api/ --alluredir=allure-results

      # 5. 执行UI自动化测试（无头模式）
      - name: 执行UI测试
        run: pytest tests/test_ui/ --alluredir=allure-results

      # 6. 安装Allure命令行工具（官方稳定版）
      - name: 安装Allure
        uses: andrcuns/allure-action@v3
        with:
          install_only: true

      # 7. 生成Allure测试报告
      - name: 生成Allure报告
        run: allure generate allure-results -o allure-report --clean

      # 8. 上传报告到GitHub Actions
      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
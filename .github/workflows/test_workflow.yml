name: 电商自动化测试CI

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: 运行接口+UI测试
        run: pytest tests/ --alluredir=allure-results

      - name: 生成Allure网页报告
        uses: allure-framework/setup-allure@v1
      - run: allure generate allure-results -o allure-report --clean

      - name: 上传网页报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 测试报告
          path: allure-report/
name: Web 端发布前验证 CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨执行

# 配置权限
permissions:
  contents: write
  pages: write
  id-token: write

# 环境变量
env:
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Web 端 UI 测试
  web-tests:
    name: Web 端 UI 测试
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_test_only_pwd
          MYSQL_DATABASE: test_auto
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 设置 Node.js 版本
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          playwright install chromium

      - name: 等待 MySQL 启动
        run: |
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -P 3306 -u root -p${MYSQL_ROOT_PASSWORD} -e "SELECT 1" 2>/dev/null; then
              echo "MySQL 服务已启动"
              break
            fi
            sleep 2
          done

      - name: 初始化测试数据库
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -p${MYSQL_ROOT_PASSWORD} -D test_auto <<'EOF'
          CREATE TABLE IF NOT EXISTS user (
            id INT AUTO_INCREMENT PRIMARY KEY,
            username VARCHAR(50) NOT NULL,
            password VARCHAR(100) NOT NULL
          );
          EOF

      - name: 启动本地登录服务
        run: |
          nohup python local_web_login/backend_server.py > login_server.log 2>&1 &
          sleep 8
          curl -s http://127.0.0.1:8090/ || echo "服务启动失败，继续执行测试"

      - name: 运行 Web 端 UI 测试
        run: |
          pytest tests/test_ui/ -v --alluredir=allure-results-ui
        continue-on-error: true
        env:
          HEADLESS: true

      - name: 上传 UI 测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: allure-results-ui

      - name: 上传 UI 测试日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-logs
          path: |
            logs/
            login_server.log

  # Web 端 API 测试
  api-tests:
    name: Web 端 API 测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 运行 API 测试
        run: |
          pytest tests/test_api/ -v --alluredir=allure-results-api
        continue-on-error: true

      - name: 上传 API 测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: allure-results-api

      - name: 上传 API 测试日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-logs
          path: logs/

  # AI 自主测试
  ai-tests:
    name: AI 自主测试
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_test_only_pwd
          MYSQL_DATABASE: test_auto
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          playwright install chromium

      - name: 等待 MySQL 启动
        run: |
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -P 3306 -u root -p${MYSQL_ROOT_PASSWORD} -e "SELECT 1" 2>/dev/null; then
              echo "MySQL 服务已启动"
              break
            fi
            sleep 2
          done

      - name: 初始化测试数据库
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -p${MYSQL_ROOT_PASSWORD} -D test_auto <<'EOF'
          CREATE TABLE IF NOT EXISTS user (
            id INT AUTO_INCREMENT PRIMARY KEY,
            username VARCHAR(50) NOT NULL,
            password VARCHAR(100) NOT NULL
          );
          EOF

      - name: 启动本地登录服务
        run: |
          nohup python local_web_login/backend_server.py > login_server.log 2>&1 &
          sleep 8
          curl -s http://127.0.0.1:8090/ || echo "服务启动失败，继续执行测试"

      - name: 检查 AI API 密钥
        id: check_keys
        run: |
          if [ -z "${{ secrets.QWEN_API_KEY }}" ] && [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "未配置 AI API 密钥，将跳过 AI 测试"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 运行 AI 自主测试
        if: steps.check_keys.outputs.skip != 'true'
        run: |
          pytest tests/test_ai/ -v --alluredir=allure-results-ai
        continue-on-error: true
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 跳过 AI 测试提示
        if: steps.check_keys.outputs.skip == 'true'
        run: echo "已跳过 AI 测试（未配置 API 密钥）"

      - name: 上传 AI 测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-results
          path: allure-results-ai

      - name: 上传 AI 测试日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-logs
          path: |
            logs/
            login_server.log

  # 生成 Allure 报告
  allure-report:
    name: 生成 Allure 报告
    needs: [web-tests, api-tests, ai-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 版本
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 下载测试结果
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 合并测试结果
        run: |
          mkdir -p merged-allure-results
          cp -r artifacts/ui-test-results/* merged-allure-results/ 2>/dev/null || true
          cp -r artifacts/api-test-results/* merged-allure-results/ 2>/dev/null || true
          cp -r artifacts/ai-test-results/* merged-allure-results/ 2>/dev/null || true

      - name: 安装 Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          npm install -g allure-commandline

      - name: 生成报告
        run: |
          if [ -d "merged-allure-results" ] && [ "$(ls -A merged-allure-results 2>/dev/null)" ]; then
            allure generate merged-allure-results -o allure-report --clean
          else
            echo "无测试结果，跳过报告生成"
            mkdir -p allure-report
          fi

      - name: 上传 Allure 报告
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: 发布 GitHub Pages 报告
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          allow_empty_commit: true
          keep_files: true
          force_orphan: true

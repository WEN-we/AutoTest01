name: Web 端发布后验证 CI

on:
  push:
    branches: [ master ]
  release:
    types: [published]
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨执行
  workflow_dispatch:
    inputs:
      environment:
        description: '验证环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# 配置权限
permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. Web 端生产环境验证
  web-prod-validation:
    name: Web 端生产环境验证
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 设置 Node.js 版本
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          playwright install chromium

      - name: 运行 Web 端生产环境验证
        run: |
          pytest tests/test_smoke/test_smoke_ui.py -v --alluredir=allure-results-web-prod
        env:
          UI_URL: ${{ secrets.PROD_UI_URL }}
          HEADLESS: true

      - name: 上传 Web 端验证结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-prod-results
          path: allure-results-web-prod

  # 2. API 生产环境验证
  api-prod-validation:
    name: API 生产环境验证
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 安装 MySQL 客户端
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: 等待 MySQL 服务启动
        run: |
          # 循环等待 MySQL 启动，最多等待 60 秒
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -P 3306 -u root -p${MYSQL_ROOT_PASSWORD} -e "SELECT 1" 2>/dev/null; then
              echo "MySQL 服务已启动"
              break
            fi
            echo "等待 MySQL 启动... (第 $i 次尝试)"
            sleep 2
          done

      - name: 初始化测试数据库
        run: |
          # 使用 TCP/IP 连接 (127.0.0.1) 而不是 socket
          mysql -h 127.0.0.1 -P 3306 -u root -p${MYSQL_ROOT_PASSWORD} <<EOF
          CREATE DATABASE IF NOT EXISTS test_auto;
          USE test_auto;
          CREATE TABLE IF NOT EXISTS user (
            id INT AUTO_INCREMENT PRIMARY KEY,
            username VARCHAR(50) NOT NULL,
            password VARCHAR(100) NOT NULL
          );
          EOF
          # 生成 1000 个测试用户数据
          python3 << 'EOF'
          import random
          import string
          import pymysql
          
          # 用户名字符集：中文、英文、数字
          chinese_chars = ''.join(chr(i) for i in range(0x4e00, 0x4e00 + 200))  # 200个常用汉字
          username_chars = chinese_chars + string.ascii_letters + string.digits
          
          # 密码字符集：英文大小写、数字、特殊符号（不含中文）
          password_chars = string.ascii_letters + string.digits + "!@#$%^&*()_+-=[]{}|;:,.<>?"
          
          def generate_username(length=8):
              """生成用户名（支持中文、英文、数字）"""
              return ''.join(random.choice(username_chars) for _ in range(length))
          
          def generate_password(length=12):
              """生成密码（英文大小写、数字、特殊符号）"""
              return ''.join(random.choice(password_chars) for _ in range(length))
          
          # 连接数据库（使用 127.0.0.1 确保 TCP/IP 连接）
          db = pymysql.connect(
              host="127.0.0.1",
              port=3306,
              user="root",
              password=os.getenv("MYSQL_ROOT_PASSWORD", ""),
              database="test_auto",
              charset="utf8mb4"
          )
          cursor = db.cursor()
          
          # 生成 1000 个唯一用户
          users = []
          used_usernames = set()  # 用于跟踪已使用的用户名
          count = 0
          max_attempts = 5000  # 最大尝试次数，防止无限循环
          
          while count < 1000 and max_attempts > 0:
              username = generate_username(random.randint(6, 12))
              if username not in used_usernames:
                  password = generate_password(random.randint(10, 16))
                  users.append((username, password))
                  used_usernames.add(username)
                  count += 1
              max_attempts -= 1
          
          # 批量插入
          cursor.executemany("INSERT INTO user (username, password) VALUES (%s, %s)", users)
          db.commit()
          
          print(f"成功插入 {len(users)} 个测试用户")
          
          cursor.close()
          db.close()
          EOF

      - name: 验证数据库连接
        run: |
          # 使用 TCP/IP 连接测试
          mysql -h 127.0.0.1 -P 3306 -u root -p${MYSQL_ROOT_PASSWORD} -e "SELECT COUNT(*) FROM test_auto.user;"

      - name: 运行 API 生产环境验证
        run: |
          pytest tests/test_smoke/test_smoke_api.py -v --alluredir=allure-results-api-prod
        env:
          API_URL: ${{ secrets.PROD_API_URL }}

      - name: 上传 API 验证结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-prod-results
          path: allure-results-api-prod

  # 3. 服务可用性检查
  service-check:
    name: 服务可用性检查
    runs-on: ubuntu-latest
    needs: [web-prod-validation, api-prod-validation]
    steps:
      - name: 检查 API 服务是否可访问
        run: |
          # 使用主 API 地址进行检查（不需要专门的 /health 端点）
          curl -f -s -o /dev/null -w "API 状态码: %{http_code}\n" ${{ secrets.PROD_API_URL }} || echo "API 服务检查完成"

      - name: 检查 UI 服务是否可访问
        run: |
          # 使用主 UI 地址进行检查
          curl -f -s -o /dev/null -w "UI 状态码: %{http_code}\n" ${{ secrets.PROD_UI_URL }} || echo "UI 服务检查完成"

  # 4. 性能监控
  performance-monitor:
    name: 性能监控
    runs-on: ubuntu-latest
    needs: service-check
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 启动本地登录服务
        run: |
          # 在后台启动本地登录服务
          nohup python local_web_login/backend_server.py > login_server.log 2>&1 &
          # 给服务一些时间来启动
          sleep 5
          # 检查服务是否启动成功
          curl -s http://127.0.0.1:8080/ || echo "服务启动失败，继续执行测试"

      - name: 运行性能监控测试
        run: |
          # 检查是否存在性能测试目录
          if [ -d "tests/test_performance/" ] && [ "$(ls -A tests/test_performance/)" ]; then
            # 检查本地服务是否可用
            if curl -f -s -o /dev/null http://127.0.0.1:8080/ 2>/dev/null; then
              echo "本地服务可用，开始性能测试"
              # 使用 Locust 运行性能测试（无头模式，较小压力）
              locust -f tests/test_performance/locustfile.py --headless -u 20 -r 2 -t 2m --csv=performance_report
            else
              echo "本地服务不可用，跳过性能测试"
            fi
          else
            echo "性能测试目录不存在或为空，跳过性能测试"
          fi
        env:
          TARGET_ENV: production
          API_URL: http://127.0.0.1:8080

      - name: 上传性能测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: allure-results-performance

  # 5. 生成发布后验证报告
  post-release-report:
    name: 生成发布后验证报告
    needs: [web-prod-validation, api-prod-validation, performance-monitor]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 版本
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 下载测试结果
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 合并测试结果
        run: |
          mkdir -p merged-allure-results
          cp -r artifacts/web-prod-results/* merged-allure-results/ 2>/dev/null || true
          cp -r artifacts/api-prod-results/* merged-allure-results/ 2>/dev/null || true
          cp -r artifacts/performance-results/* merged-allure-results/ 2>/dev/null || true

      - name: 安装 Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          npm install -g allure-commandline

      - name: 生成报告
        run: allure generate merged-allure-results -o post-release-report --clean

      - name: 上传发布后验证报告
        uses: actions/upload-artifact@v4
        with:
          name: post-release-report
          path: post-release-report

      - name: 发布 GitHub Pages 报告
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: post-release-report
          allow_empty_commit: true
          keep_files: true
          force_orphan: true
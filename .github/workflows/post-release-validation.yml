name: Web 端发布后验证 CI

on:
  push:
    branches: [ master ]
  release:
    types: [published]
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨执行
  workflow_dispatch:
    inputs:
      environment:
        description: '验证环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# 配置权限
permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # 产物目录配置
  ARTIFACTS_DIR: "ci-artifacts"
  REPORTS_DIR: "ci-artifacts/reports"
  LOGS_DIR: "ci-artifacts/logs"
  METRICS_DIR: "ci-artifacts/metrics"
  METADATA_DIR: "ci-artifacts/metadata"

jobs:
  # 1. Web 端生产环境验证
  web-prod-validation:
    name: Web 端生产环境验证
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_CI_PASSWORD }}
          MYSQL_DATABASE: test_auto
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 设置 Node.js 版本
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          playwright install chromium

      - name: 创建产物目录
        run: |
          mkdir -p ${{ env.REPORTS_DIR }} ${{ env.LOGS_DIR }} ${{ env.METADATA_DIR }}

      - name: 等待 MySQL 启动
        run: |
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -P 3306 -u root -p${MYSQL_ROOT_PASSWORD} -e "SELECT 1" 2>/dev/null; then
              echo "MySQL 服务已启动"
              break
            fi
            sleep 2
          done
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_CI_PASSWORD }}

      - name: 初始化测试数据库
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -p${MYSQL_ROOT_PASSWORD} -D test_auto <<'EOF'
          CREATE TABLE IF NOT EXISTS user (
            id INT AUTO_INCREMENT PRIMARY KEY,
            username VARCHAR(50) NOT NULL,
            password VARCHAR(100) NOT NULL
          );
          EOF
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_CI_PASSWORD }}

      - name: 初始化数据库（建库建表）
        run: |
          python local_web_login/init_database.py
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: ${{ secrets.MYSQL_CI_PASSWORD }}
          LOCAL_DB_NAME: local_web_login

      - name: 启动本地登录服务
        run: |
          nohup python local_web_login/backend_server.py > login_server.log 2>&1 &
          sleep 8
          curl -s http://127.0.0.1:8090/ || echo "服务启动失败，继续执行测试"

      - name: 运行 Web 端生产环境验证
        run: |
          pytest tests/test_smoke/test_smoke_ui.py -v \
            --alluredir=${{ env.REPORTS_DIR }}/allure-web-prod \
            --tb=short \
            --log-file=${{ env.LOGS_DIR }}/web-test.log \
            --log-level=INFO
        continue-on-error: true
        env:
          HEADLESS: true

      - name: 收集环境信息
        run: |
          echo "=== 环境信息 ===" > ${{ env.METADATA_DIR }}/env-info.txt
          echo "Python 版本: $(python --version)" >> ${{ env.METADATA_DIR }}/env-info.txt
          echo "操作系统: $(uname -a)" >> ${{ env.METADATA_DIR }}/env-info.txt
          echo "工作目录: $(pwd)" >> ${{ env.METADATA_DIR }}/env-info.txt
          echo "时间: $(date)" >> ${{ env.METADATA_DIR }}/env-info.txt

      - name: 上传 Web 端验证结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-prod-results
          path: ${{ env.REPORTS_DIR }}/allure-web-prod

      - name: 上传 Web 端测试日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-prod-logs
          path: |
            ${{ env.LOGS_DIR }}
            login_server.log

  # 2. API 生产环境验证
  api-prod-validation:
    name: API 生产环境验证
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 创建产物目录
        run: |
          mkdir -p ${{ env.REPORTS_DIR }} ${{ env.LOGS_DIR }}

      - name: 运行 API 生产环境验证
        run: |
          pytest tests/test_smoke/test_smoke_api.py -v \
            --alluredir=${{ env.REPORTS_DIR }}/allure-api-prod \
            --tb=short \
            --log-file=${{ env.LOGS_DIR }}/api-test.log \
            --log-level=INFO
        continue-on-error: true

      - name: 上传 API 验证结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-prod-results
          path: ${{ env.REPORTS_DIR }}/allure-api-prod

      - name: 上传 API 测试日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-prod-logs
          path: ${{ env.LOGS_DIR }}

  # 3. 服务可用性检查
  service-check:
    name: 服务可用性检查
    runs-on: ubuntu-latest
    needs: [web-prod-validation, api-prod-validation]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 检查本地 API 服务是否可访问
        run: |
          # 启动本地登录服务进行连通性检查
          nohup python local_web_login/backend_server.py > service_check.log 2>&1 &
          sleep 8
          # 检查本地服务（端口8090）
          if curl -f -s -o /dev/null -w "本地服务状态码: %{http_code}\n" http://127.0.0.1:8090/; then
            echo "本地服务可访问"
          else
            echo "本地服务不可访问，但不阻塞流程"
          fi

      - name: 检查外部服务（可选）
        run: |
          # 如果配置了 PROD_API_URL，则检查外部服务
          if [ -n "${{ secrets.PROD_API_URL }}" ]; then
            echo "检查外部 API 服务: ${{ secrets.PROD_API_URL }}"
            curl -f -s -o /dev/null -w "外部 API 状态码: %{http_code}\n" ${{ secrets.PROD_API_URL }} || echo "外部 API 服务检查完成（可能不可访问）"
          else
            echo "未配置 PROD_API_URL secret，跳过外部 API 检查"
          fi
          if [ -n "${{ secrets.PROD_UI_URL }}" ]; then
            echo "检查外部 UI 服务: ${{ secrets.PROD_UI_URL }}"
            curl -f -s -o /dev/null -w "外部 UI 状态码: %{http_code}\n" ${{ secrets.PROD_UI_URL }} || echo "外部 UI 服务检查完成（可能不可访问）"
          else
            echo "未配置 PROD_UI_URL secret，跳过外部 UI 检查"
          fi

  # 4. 性能监控
  performance-monitor:
    name: 性能监控
    runs-on: ubuntu-latest
    needs: service-check
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_CI_PASSWORD }}
          MYSQL_DATABASE: test_auto
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 安装 MySQL 客户端
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: 等待 MySQL 启动
        run: |
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -P 3306 -u root -p${MYSQL_ROOT_PASSWORD} -e "SELECT 1" 2>/dev/null; then
              echo "MySQL 服务已启动"
              break
            fi
            sleep 2
          done
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_CI_PASSWORD }}

      - name: 初始化测试数据库
        run: |
          # 创建用户表
          mysql -h 127.0.0.1 -P 3306 -u root -p${MYSQL_ROOT_PASSWORD} -D test_auto <<'EOF'
          CREATE TABLE IF NOT EXISTS user (
            id INT AUTO_INCREMENT PRIMARY KEY,
            username VARCHAR(50) NOT NULL,
            password VARCHAR(100) NOT NULL
          );
          EOF
          # 生成测试用户（用户名/密码需与 tests/test_performance/tasks/user_tasks.py 保持一致）
          python3 << 'EOF'
          import os
          import pymysql

          db = pymysql.connect(host="127.0.0.1", port=3306, user="root", password=os.getenv("MYSQL_ROOT_PASSWORD", ""), database="test_auto", charset="utf8mb4")
          cursor = db.cursor()

          # 用户名 perf_test_0001 ~ perf_test_1000，密码统一 Test@1234
          # 与 locust user_tasks.py 中生成的凭据完全匹配
          users = [(f"perf_test_{i:04d}", "Test@1234") for i in range(1, 1001)]

          cursor.executemany("INSERT INTO user (username, password) VALUES (%s, %s)", users)
          db.commit()
          print(f"插入 {len(users)} 个用户")
          cursor.close()
          db.close()
          EOF
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_CI_PASSWORD }}

      - name: 初始化数据库（建库建表）
        run: |
          python local_web_login/init_database.py
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: ${{ secrets.MYSQL_CI_PASSWORD }}
          LOCAL_DB_NAME: local_web_login

      - name: 启动本地登录服务
        run: |
          nohup python local_web_login/backend_server.py > login_server.log 2>&1 &
          sleep 8
          curl -s http://127.0.0.1:8090/ || echo "服务启动失败"

      - name: 创建产物目录
        run: |
          mkdir -p ${{ env.REPORTS_DIR }} ${{ env.LOGS_DIR }} ${{ env.METRICS_DIR }}

      - name: 运行性能监控测试
        run: |
          if [ -d "tests/test_performance/" ] && [ "$(ls -A tests/test_performance/)" ]; then
            if curl -f -s -o /dev/null http://127.0.0.1:8090/ 2>/dev/null; then
              echo "本地服务可用，开始性能测试"
              # 运行性能测试并生成多种报告
              locust -f tests/test_performance/locustfile.py --headless -u 20 -r 2 -t 2m \
                --csv=${{ env.METRICS_DIR }}/performance_report \
                --logfile=${{ env.LOGS_DIR }}/locust.log || true
              # 生成 HTML 报告
              locust -f tests/test_performance/locustfile.py --headless -u 20 -r 2 -t 30s \
                --html=${{ env.REPORTS_DIR }}/performance-report.html || true
            else
              echo "本地服务不可用，跳过性能测试"
            fi
          else
            echo "性能测试目录不存在或为空，跳过性能测试"
          fi
        continue-on-error: true
        env:
          TARGET_ENV: production
          API_URL: http://127.0.0.1:8090

      - name: 上传性能测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports
          path: |
            ${{ env.REPORTS_DIR }}/performance-report.html
            ${{ env.METRICS_DIR }}/

      - name: 上传性能测试日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-logs
          path: |
            ${{ env.LOGS_DIR }}
            login_server.log

  # 5. 生成发布后验证报告
  post-release-report:
    name: 生成发布后验证报告
    needs: [web-prod-validation, api-prod-validation, performance-monitor]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 版本
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 下载测试结果
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建产物目录
        run: |
          mkdir -p ${{ env.REPORTS_DIR }} ${{ env.METADATA_DIR }}

      - name: 合并测试结果
        run: |
          mkdir -p merged-allure-results
          cp -r artifacts/web-prod-results/* merged-allure-results/ 2>/dev/null || true
          cp -r artifacts/api-prod-results/* merged-allure-results/ 2>/dev/null || true

      - name: 生成测试摘要
        run: |
          echo "=== 测试摘要 ===" > ${{ env.METADATA_DIR }}/test-summary.txt
          echo "工作流名称: ${{ github.workflow }}" >> ${{ env.METADATA_DIR }}/test-summary.txt
          echo "触发事件: ${{ github.event_name }}" >> ${{ env.METADATA_DIR }}/test-summary.txt
          echo "分支: ${{ github.ref }}" >> ${{ env.METADATA_DIR }}/test-summary.txt
          echo "提交: ${{ github.sha }}" >> ${{ env.METADATA_DIR }}/test-summary.txt
          echo "运行时间: $(date)" >> ${{ env.METADATA_DIR }}/test-summary.txt

      - name: 安装 Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          npm install -g allure-commandline

      - name: 生成报告
        run: |
          if [ -d "merged-allure-results" ] && [ "$(ls -A merged-allure-results 2>/dev/null)" ]; then
            allure generate merged-allure-results -o post-release-report --clean
          else
            echo "无测试结果，跳过报告生成"
            mkdir -p post-release-report
          fi

      - name: 上传发布后验证报告
        uses: actions/upload-artifact@v4
        with:
          name: post-release-report
          path: post-release-report

      - name: 发布 GitHub Pages 报告
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: post-release-report
          allow_empty_commit: true
          keep_files: true
          force_orphan: true

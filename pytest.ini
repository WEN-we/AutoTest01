[pytest]
# 测试用例目录（指定tests目录）
testpaths = tests
# 用例命名规则（匹配test_*.py文件中的test_*函数）
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# 禁用不必要的警告，默认生成allure结果到reports/allure-results
addopts = -p no:warnings -ra --strict-markers --alluredir=reports/allure-results
# 避免把历史报告/缓存当测试收集
norecursedirs = .pytest_cache allure-results allure-report logs bat
# 编码格式
console_output_encoding = utf-8

markers =
    api: 接口测试
    ui: Web UI 测试（Playwright）
    smoke: 冒烟测试
    android: Android APP 测试（Appium/Airtest）
    ios: iOS APP 测试（Appium/XCUITest）
    harmony: 鸿蒙（Harmony）端测试（通常以接口/服务为主）
    windows: Windows 桌面自动化
    linux: Linux 桌面自动化
    service: Linux 服务端/SSH 自动化